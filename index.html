."}, {"num": "8", "text": "مكان الإنتظار :  4  كراسي على الأقل لكل عيادة أو حسب نسبة التردد ."}, {"num": "9", "text": "كل عيادة بها حوض و ماء جاري و صابون و فوط لتجفيف الأيدى ."}, {"num": "10", "text": "تواجد مدير العيادات ومشرفة التمريض مكلفين بأمر رسمى."}, {"num": "11", "text": "بجوار كل عيادة لافتة توضح إسم الطبيب وتخصصه."}, {"num": "12", "text": "ملف المريض بالعيادات مكتمل البيانات ومسجل بها (التشخيص – السن- الأدوية بالتركيز والجرعات وطريقة الإستخدام –إسم الطبيب و الممرضة ثلاثياً"}, {"num": "13", "text": "يتم إعلام المريض بالوقت المتوقع للإنتظار"}]}, {"title": "القوائم:", "items": [{"num": "14", "text": "قائمة بتجهيزات كل عيادة."}, {"num": "15", "text": "قائمة بالأدوية المتوفرة بكل عيادة محدثة."}, {"num": "16", "text": "يوجد سجل  لتسجيل المرضى بكل عيادة ."}]}, {"title": "السجلات:", "items": [{"num": "17", "text": " سجل تسجيل تردد المرضى.\n سجل النتائج الحرجة\n سجل و نماذج إحالة\n سجل الأعطال\n سجل الصيانة الدورية\n سجل بالقسم لتسليم النفايات\n سجل تسليم و تسلم المفروشات النظيفة و غير النظيفة."}]}]}, {"key": "telehealth", "title": "التشخيص عن بعد", "max": 12, "subsections": [{"title": "التجهيزات:", "items": [{"num": "1", "text": "يوجد غرفة مزودة بوصلة إنترنت."}, {"num": "2", "text": "سرير كشف ."}, {"num": "3", "text": "مكتب وكرسي."}, {"num": "4", "text": "يوجد جهاز telemedicine  : \nوهو جهاز كمبيوتر مزود بجهاز رسم قلب، سماعة، derma scope، otoscope، ophthalmoscope، scanner وprinter وسماعة بلوتوث."}, {"num": "5", "text": "يوجد بالغرفة ٢ تمريض ."}, {"num": "6", "text": "يوجد سجل لتسجيل الحالات"}]}]}, {"key": "isolation", "title": "مواصفات غرف العزل", "max": 14, "subsections": [{"title": "مواصفات غرف العزل:", "items": [{"num": "1", "text": "بعيدة عن أماكن رعاية المرضى."}, {"num": "2", "text": "حوض مخصص لغسيل الأيدى ."}, {"num": "3", "text": "دورة مياه داخل الغرفة."}, {"num": "4", "text": "مطهر للأيدى عند مدخل الغرفة."}, {"num": "5", "text": "باب ذاتى الغلق."}, {"num": "6", "text": "جيدة التهوية و مزودة بشفاطات سحب الهواء لخارج المنشأة ."}, {"num": "7", "text": "توجد غرفة ما قبل العزل لحفظ المستلزمات النظيفة  الخاصة بمرضى العزل."}]}]}, {"key": "pharmacy", "title": "الصيدلية", "max": 24, "subsections": [{"title": "قوائم الأدوية:", "items": [{"num": "1", "text": "توجد قائمة / قوائم معتمدة و محدثة:\n قائمة الأدوية الأساسية محدثة ( سنوياً)\n قائمة بالأدوية الفعلية موزعة على جميع الأقسام و العيادات محدثة\n الأدوية عالية الخطورة – عالية التركيز – المتشابهة فى الشكل و النطق\n ثبات الأدوية \n الأدوية التى تتأثر بالضوء\n الأدوية التى تحفظ بالثلاجة\n الإختصارات الدوائية الممنوعة"}, {"num": "2", "text": "يتم وضع علاج كل مريض علي حدى وتمييز كل دواء بما يلي :\n \tالإسم الرباعى المريض و رقم ملفه الطبى  \n \tإسم الدواء و تركيزه\n \tالجرعة\n \tطريقة الإعطاء  \n \tمدة العلاج"}, {"num": "3", "text": "توجد قائمة بأدوية الطوارئ موضح بها :\n الإسم العلمي\n العدد\n تاريخ إنتهاء الصلاحية\n رقم التشغيلة\n الشكل الدوائى"}, {"num": "4", "text": "أدوية الطوارئ متوفرة و آمنة"}, {"num": "5", "text": "توجد عربة للطوارئ  بأقسام المستشفى تتوفر بها الشروط التالية:\n توجد قائمة  و خريطة موحدة بالمستشفى تحدد مكونات وترتيب عربة الطوارئ.\n تتوفر أجهزة ومستلزمات الطوارئ وتكون ملائمة للمرحلة العمرية  \n يتم إستعاضة الأدوية والمستلزمات المستخدمة من عربة الطوارئ فور إستخدامها\n التحقق من معدات ومستلزمات الطوارئ یومیاً للتأكد من توافرھا وجاھزیتھا للإستخدام ( مثل جهاز الصدمات  - المنظار الحنجرى).\n تحديد مسئول عن العربة يقوم  بمراجعة هذه العربات يوميا موثق بسجل توزيع المهام.\n يقوم  صيدلي بالمرور على عربات الطوارئ  و دولاب الأدوية و يتم توثيق ذلك"}, {"num": "6", "text": "يوجد نموذج محضر فتح عربة الطوارئ"}, {"num": "7", "text": "يتم فصل و تمييز الأدوية عالية الخطورة – عالية التركيز – المتشابهة فى الشكل و النطق"}, {"num": "8", "text": "يتم متابعة تسجيل درجة حرارة الثلاجة يوميا"}, {"num": "9", "text": "متابعة تسجيل درجة الحرارة و الرطوبة فى أماكن تواجد الأدوية"}, {"num": "10", "text": "عناصر كتابة الوصفة الطبية كاملة و واضحة و صحيحة."}, {"num": "11", "text": "الحصر الدورى للأدوية التى قاربت على الإنتهاء ( 6 أشهر)"}, {"num": "12", "text": "مراعاة إشتراطات التخزين الآمن للأدوية على سبيل المثال :\n نظافة وجفاف الأماكن المُخصصة لتخزين الأدوية\n وضع أوعية الأدوية بعيدًا عن الأرض، و وضعها على أرفف، مع ترك مسافات بينها بما يسمح بالتنظيف.\n حفظ الأدوية بالثلاجة ( درجة الحرارة 2-8 م), حرارة الغرفة ( 25-30 م), و الرطوبة لا تزيد عن 65%\n حفظ الأدوية داخل عبواتها بعيداً عن الضوء المباشر.\n تمييز حاويات التخزين بملصقات تتضمن جميع المعلومات المتعلقة  بالدواء ( الإسم العلمى – التركيز – الشكل الدوائى – رقم التشغيلة)\n التهوية الجيدة بمخازن الأدوية."}]}]}, {"key": "radiology", "title": "الأشعة", "max": 68, "subsections": [{"title": "البنية التحتية بالأشعة :", "items": [{"num": "1", "text": "قسم الأشعة مرخص."}]}, {"title": "التجهيزات بالأشعة :", "items": [{"num": "2", "text": " جهاز أشعة مقطعية"}, {"num": "3", "text": " جهاز أشعة ثابت"}, {"num": "4", "text": " جهاز أشعة نقال"}, {"num": "5", "text": " جهاز أشعة تليفزيونية"}, {"num": "6", "text": " جهاز رنين."}, {"num": "7", "text": " جهاز تحميض أوتوماتيكى"}, {"num": "8", "text": " أخرى (تُذكر)."}, {"num": "9", "text": "وجود وسائل قياس الإشعاع  الشخصية لكل  من يعمل بالقسم :\n الأفلام الحساسة\n أو دوزيمترات الجيب\n وجود توثيق لتسجيل قياس الأشعة في البيئة المحيطة بإستخدام جهاز جيجر مولر"}, {"num": "10", "text": "•\tيتم قياس الأفلام الحساسة ( كل 6 أشهر) / دوزيمترات الجيب ( كل سنة) بصفة دورية و يتم التوثيق ."}, {"num": "11", "text": " توجد وسائل تهوية كافية"}, {"num": "12", "text": "  غلاف الوحدات المتنقلة تام الوقاية."}, {"num": "13", "text": " يوجد حاجز للوقاية من الإشعاع في غرفة التصوير ذو مساحة كافية وسمك 1 مم مكافئ ."}]}, {"title": "إشتراطات السلامة بالأشعة :", "items": [{"num": "14", "text": "وجود علامات تحذيرية واضحة للعاملين والمترددين:\n ممنوع دخول الحوامل\n ممنوع دخول مرافقين\n خطر الاشعاع"}, {"num": "15", "text": "ممنوع دخول مرافق مع المريض لعمل الأشعة إلا عند الضرورة ويتم إرتداء المرافق للمريلة المرصصة."}, {"num": "16", "text": "يتم غلق الباب عند عمل الأشعة"}, {"num": "17", "text": "وجود لمبة حمراء على باب الأشعة لمنع الدخول أثناء التصوير تضئ عند عمل الأشعة."}, {"num": "18", "text": "يوجد ملف لكل موظف بالأشعة يحتوى على الأقل:\n  الكشف الدوري كل ستة أشهر (باطنة، جلدية، رمد,  صورة دم كاملة ).\n نتيجة قياس نسبة التعرض للإشعاع."}, {"num": "19", "text": "وجود إجراءات متخذة  في حالة تجاوز فحص البادج فيلم/ الدوزيميتر للجرعة القصوى( 20 )  ﻤﻠﻲ ﺴﻴﻔﺭﺕ ﻓﻲ ﺍﻟﺴﻨﺔ (إستبعاد الفني عن العمل الفني – إجراء دوائى ..........إلخ)."}]}, {"title": "معدات الوقاية الشخصية :", "items": [{"num": "20", "text": "توافر معدات الحماية الشخصية:\n حاجز مرصص به شباك زجاج مرصص\n مرايل مرصصه معلقه بشكل صحيح على شماعة خاصه بدون طي\n واقي الاعضاء التناسلية مرصص\n واقي الغده الدرقية مرصص\n بارافانات مرصصة لأجهزة الأشعة المتنقلة (2 بارفان لكل جهاز)"}]}, {"title": "القوائم :", "items": [{"num": "21", "text": "توجد قائمة بالإجراءات الخاصة التي يجب أن تتم تحت إشراف الطبيب"}, {"num": "22", "text": "توجد قائمة بحصر الأجهزة الموجودة ودليل تشغيل لكل جهاز"}, {"num": "23", "text": "قائمة النتائج الحرجة لجميع أنواع الأشعة المتاحة بالمستشفى."}, {"num": "24", "text": "قائمة بقياس درجة حرارة غرفة الأشعة المقطعية"}]}, {"title": "السجلات :", "items": [{"num": "25", "text": " سجل الفحص الدوري للأجهزة كل شفت \n سجل الأعطال \n سجل النتائج الحرجة\n سجل معايرة  لكل الأجهزة حسب تعليمات الشركة المصنعة\n سجل الأشعة به  الإجراء الذي تم وعدد الأفلام المستخدمة و تحديد عدد الأفلام الذي تم إعادة تصويرها بسبب رداءة نوعية الأفلام."}]}, {"title": "ملاحظات عامة :", "items": [{"num": "26", "text": "أخصائي الأشعة يقدم تقرير نهائي لكافة الإختبارات والإجراءات التشخيصية"}, {"num": "27", "text": "تحديد إطار زمني معلن لتوافر التقارير الطارئة والروتينية وفقا لنوع الإجراء."}, {"num": "28", "text": "تسجيل الجرعات الإشعاعية التي يتعرض لها المرضي (نموذج تقرير الأشعة (أو نموذج خاص بذلك) - وسجل الأشعة)"}, {"num": "29", "text": "ترصيص الجدران والأبواب (الترصيص يكون على إرتفاع 2 م علي الأقل / يتم إعادة الترخيص عند حدوث أي تغيرات)."}, {"num": "30", "text": "يوجد مكان إنتظار للمرضي قريب من قسم الأشعة يسمح بإستيعاب أعداد المرضى، نظيف، آمن، و ذة إضاءة جيدة."}, {"num": "31", "text": "وجود عربة طوارئ  بالأشعة / أو بمكان قريب من القسم (خاصة في حالة وجود أشعة مقطعية – إجراء بالصبغة ............)"}, {"num": "32", "text": "العاملون بالأشعة مدربون على كيفية التعامل مع حالات الإنعاش القلبي الرئوي الأساسى لحين وصول فريق الكود بلو."}, {"num": "33", "text": "وجود صحيفة  الأمان لجميع المواد الكيميائية MSDS ."}, {"num": "34", "text": "العاملون بالأشعة مدربون على MSDS  مع التوثيق بسجل التدريب."}]}]}, {"key": "blood_bank", "title": "بنك الدم", "max": 62, "subsections": [{"title": "4. بنك الدم:", "items": [{"num": "1", "text": "تحديد بنك دم تجميعى أم تخزينى"}, {"num": "2", "text": "يوجد مدير لبنك الدم مؤهل (أخصائي باثولوجي)"}]}, {"title": "البنية التحتية ببنك الدم :", "items": [{"num": "3", "text": " بنك الدم مرخص"}, {"num": "4", "text": " مكان للتسجيل الإدارى"}, {"num": "5", "text": " معمل تحاليل الدم"}, {"num": "6", "text": " مكان لإجراء التوافق"}, {"num": "7", "text": " مكان للإدماء ( فى حالة بنك الدم التجميعى)"}, {"num": "8", "text": " منطقة فحص الدم ( فى حالة بنك الدم التجميعى)"}, {"num": "9", "text": " منطقة حفظ الدم و بها ثلاجات و ديب فريزر للحفظ."}]}, {"title": "التجهيزات ببنك الدم :", "items": [{"num": "10", "text": " سنترفيوج"}, {"num": "11", "text": " ميكروسكوب"}, {"num": "12", "text": " جهاز لقياس الهيموجلوبين."}, {"num": "13", "text": " ثلاجة حفظ دم قبل الفحص"}, {"num": "14", "text": " ثلاجة حفظ دم بعد الفحص بجهازإنذار صوتى ومؤشر لدرجة الحرارة"}, {"num": "15", "text": " يوجد ديب فريزر لحفظ البلازما بجهازإنذار صوتى ومؤشر لدرجة الحرارة"}, {"num": "16", "text": " جهاز خلط الدم أو جهاز هزاز أثناء التبرع (بغرفة  الإدماء فى حالة بنك الدم التجميعى) )"}, {"num": "17", "text": " نظام إليزا لفحص االمراض المعدية عن طريق نقل الدم"}, {"num": "18", "text": " جهاز هزاز و دوارلحفظ الصفائح الدموية في درجة حرارة الغرفة) 22-24) درجة مئوية."}, {"num": "19", "text": " ثلاجة نقل الدم بين المستشفيات (كولمان خاص)"}, {"num": "20", "text": " أسرة لسحب الدم من المتبرعين."}, {"num": "21", "text": " جهازفصل البلازما اليدوى"}, {"num": "22", "text": " ميزان كهربائي حساس لوزن مشتقات الدم"}, {"num": "23", "text": " ميزان أشخاص"}, {"num": "24", "text": " جهاز تكييف."}, {"num": "25", "text": " حمام مائى متغير"}]}, {"title": "السجلات:", "items": [{"num": "26", "text": " سجل التبرع\n سجل نتائج فحص أكياس الدم\n سجل الصرف\n سجلات تتبع الدم بدءاً من التبرع حتي الإعطاء\n سجل إعدام الدم ومحاضر الإعدام\n سجل المرتجع\n سجل الأمانات ( سجل تتبع جميع وحدات الدم ومشتقاته، بدءًا من التبرع وحتى صرفها للمريض).\n سجل الإنذارات الحرجة\n سجل الأعطال\n سجل حصر الأجهزة"}]}, {"title": "النماذج  ببنك الدم :", "items": [{"num": "27", "text": " إستمارات التبرع\n نماذج تسليم الدم"}, {"num": "28", "text": "وجود لافتة بممنوع دخول غير العاملين لمنطقة  فحص وحفظ الدم"}]}, {"title": "مواصفات كيس الدم :", "items": [{"num": "29", "text": "توجد البيانات الأساسية على  كيس الدم على الأقل :\n رقم الكيس\n رقم التتبع (رقم اللي)\n إسم بنك الدم\n الفصيلة\n نتيجة فحص عامل ريساس\n نتيجة فحص الفيروسات\n درجة حرارة التخزين\n تاريخ الإدماء وتاريخ الإنتهاء ( الصلاحية)"}, {"num": "30", "text": "مراعاة شروط تخزين أكياس الدم: \n أكياس الدم :  2- 6 درجة مئوية ( لمدة 42 يوم).\n البلازما : 0 – ( -18  أو أقل ) درجة مئوية ( حفظها يصل لمدة عام).\n الصفائح الدموية: 22 – 24 درجة مئوية ( 3-5 أيام)."}, {"num": "31", "text": "تسجيل درجات حرارة ثلاجات حفظ الدم"}]}]}, {"key": "sterilization", "title": "وحدة التعقيم المركزى", "max": 54, "subsections": [{"title": "أولا: تجهيزات الوحدة:", "items": [{"num": "1", "text": "ملاحظـــة مسار إعادة معالجة و إستخدام الآلات :\n وجود مدخل لاستلام الأدوات الملوثة .\n وجود منطقة لتنظيف الأدوات الملوثة .\n منطقة تطهير.\n منطقة تجفيف الآلات ثم الفحص و الفرز .\n منطقة التغليف .\n منطقة التعقيم .\n منطقة التخزين .\n منطقة مخرج لتسليم الآلات المعقمة ."}, {"num": "2", "text": "يوجد فاصل مادى بين مناطق مراحل التعقيم المختلفة ."}, {"num": "3", "text": "فى حالة عدم وجود باب واحد  يتم الإلتزام بفاصل زمنى معلن و معتمد"}, {"num": "4", "text": "إلتزام العاملون بمسار إعادة معالجة الآلات."}, {"num": "5", "text": "ملاحظـــة الأجهزة و الأثاث )ماكينة التنظيف– الأوتوكلاف – ماكينة التغليف– حاويات نقل الأدوات – التربيزات و الكراسى .. إلخ:\n \tسليمة.\n \tنظيفة .\n \tيتم التطهير يومياً ( 1 لتر ماء إلى 20 ملل)."}, {"num": "6", "text": "الإلتزام بجدول النظافة و الجرد."}]}, {"title": "ثانيا : ملاحظـــة المستلزمات :", "items": [{"num": "7", "text": "توافر المستلزمات الأساسية لمكافحة العدوى :\nحوض لغسيل الأيدي - صابون الأيدى و الأرضيات – مناديل أو فوط تجفيف الأيدى - قفازات شديدة التحمل و ذات الإستخدام الواحد - مريلة بلاستيكية .- نظارات واقية – ماسك - غطاء للرأس ( أوفر هيد ) - سابوه مقفول ."}, {"num": "8", "text": "توافرالكواشف اللازمة للتأكد من سلامة التعقيم ."}, {"num": "9", "text": "توافر ورق الكريب و الرول اللازم للتغليف ."}, {"num": "10", "text": "توافرالشاش- القطن – الدرسنج ."}]}, {"title": "إجراءات العمل:", "items": [{"num": "11", "text": "يتم الإلتزام بإجراءات إعادة معالجة الأدوات و الآلات طبقاً لسياسة مكافحة العدوى."}, {"num": "12", "text": "ضبط الأوتوكلاف بالنسبة لتعقيم الأدوات المغلقة أو منسوجات :\n 121 درجة مئوية لمدة 30 دقيقة وضغط يعادل 1 بار .\n 134 درجة مئوية لمدة 15 دقيقة وضغط يعادل 2 بار ."}, {"num": "13", "text": "تخزين الآلات و المعدات و الباكيتات المعقمة:\n يجب أن يتم التخزين على أرفف بعيدة عن الأرض.\n يجب أن يتم التخزين على الرف الأسفل أولاً ما هو أحدث تاريخاً.\n يجب أن يتم الاستخدام من الأقدم تاريخاً للتعقيم.\n تعتبر العبوة المغلفة معقمة طالما أنها سليمة وجافة و سارية الصلاحية \n تسجيل تاريخ بداية و نهاية التعقيم و إسم القائم بالتغليف ثلاثياً على كل عبوة بطريقة تضمن سلامة التعقيم."}, {"num": "14", "text": "وجود كارت تعريف وكارت صيانة ودليل تشغيل لكل جهاز."}, {"num": "15", "text": "ملاحظـــة  التكييف بغرفة التعقيم :\n نظيف .\n تاريخ مدة تغير الفلاتر .\n تعمل بكفاءة ."}]}, {"title": "متابعة كفاءة التعقيم بجهاز الأوتوكلاف :", "items": [{"num": "16", "text": "يتم تخصيص سجل لكل جهاز على حدة ."}, {"num": "17", "text": " يتم عمل الإختبارات اللازمة للتأكد من سلامة التعقيم :\n يتم عمل  إختبار البوفيدك مع بداية كل يوم عمل و توضع بالسجل الخاص بالجهاز.\n توضع كواشف كيميائية خارجية  و داخلية يتغير لونها عند الوصول إلى درجة الحررة المطلوبة ( class 4/ 5/ 6).\n يجب أن يتم إجراء الإختبار بإستخدام المؤشرات البيولوجية:\n عند بداية تشغيل جهاز الأوتوكلاف لأول مرة .\n كل شهر ( على الأكثر).\n في حالة حدوث أعطال بالجهاز .\n بعد إجراء عمليات صيانة للجهاز.\n قبل العمليات  الكبرى للعظام."}]}, {"title": "السجلات :", "items": [{"num": "18", "text": "يوجد سجل لإستلام الآلات الملوثة."}, {"num": "19", "text": "يوجد سجل لتسليم  الآلات المعقمة و المطهرة."}, {"num": "20", "text": "سجل لكل جهاز أوتوكلاف على حدة  (سجل كفاءه التعقيم) , و يشمل :\nالتاريخ و الساعة – درجة الحرارة – الضغط – رقم دورة النعقيم بالجهاز – نتيجة المؤشر."}, {"num": "21", "text": "سجل التعقيم يحتوي على:\n التاريخ- الساعة- رقم دورة التعقيم – نوع الأدوات في كل دورة ( آلات / منسوجات)- رقم الأوتوكلاف المستخدم- إسم القائم بالتعقيم."}, {"num": "22", "text": "سجلات متابعة كفاءة التعقيم بجهاز الأوتوكلاف:\n سجل تسجيل الكواشف الكيميائية لكل دورة (مؤشر من الكلاس 4 على الأقل) \n سجل تسجيل مؤشر البوفيدك يوميا\n سجل تسجيل المؤشر البيولوجي \n الإجراء التصحيحي المتخذ في حالة ان المؤشر إيجابي."}, {"num": "23", "text": "وجود سجل صيانة دورية للأوتوكلاف."}, {"num": "24", "text": "وجود سجل أعطال."}, {"num": "25", "text": "فى حالة وجود منظار , يوجد سجل يشمل الآتى على الأقل:\nالتاريخ – اليوم – نوع المنظار – رقم المنظار- تاريخ  تحضير السايديكس – ساعة بدء التطهير – ساعة الإنتهاء من التطهير- رقم الدورة - إســم الممرضة ثلاثياً."}]}, {"title": "القوائم – جداول تنظيف :", "items": [{"num": "26", "text": "يوجد قائمة بمستوى المخزون المطلوب من المواد المعقمة ."}, {"num": "27", "text": "يوجد جدول النظافة اليومى – الجرد الشهرى و يتم الإلتزام به."}]}]}, {"key": "laundry", "title": "وحدة غسيل المفروشات", "max": 44, "subsections": [{"title": "أولاً : تجهيزات المغسلة :", "items": [{"num": "1", "text": "ملاحظـــة مسار إستلام المفروشات الملوثة حتى تسليمها نظيفة لأقسام المستشفى:\n وجود مدخل لإستلام و فرز المفروشات الملوثة .\n وجود منطقة لتنظيف المفروشات الملوثة .\n وجود منطقة تجفيف المفروشات النظيفة .\n وجود منطقة فرز المفروشات النظيفة و حياكة الممزق منها.\n وجود منطقة كــى المفروشات النظيفة .\n وجود منطقة تخزين المفروشات النظيفة .\n وجود منطقة مخرج لتسليم  المفروشات النظيفة .\n وجود منطقة لحفظ  المواد الكيماوية."}, {"num": "2", "text": "يوجد فاصل مادى بين مناطق مراحل غسيل المفروشات المختلفة."}, {"num": "3", "text": "فى حالة وجود مدخل واحد  يتم الإلتزام بفاصل زمنى معلن و معتمد."}, {"num": "4", "text": "إلتزام العاملون بمسار غسيل المفروشات."}, {"num": "5", "text": "ملاحظـــة الأجهزة و الأثاث ( غسالات التنظيف - حاويات نقل المفروشات الملوثة و النظيفة    – الترابيزات و الكراسى...الخ...)\n سليمة.\n نظيفة .\n يتم التطهير يوميا ( 1 لتر ماء إلى 20 ملل كلور)"}, {"num": "6", "text": "الإلتزام بجدول النظافة و الجرد."}]}, {"title": "ثانيا : ملاحظـــة المستلزمات :", "items": [{"num": "7", "text": "توافر المستلزمات الأساسية لمكافحة العدوى :\nحوض لغسيل الأيدي - صابون الأيدى و الأرضيات – مناديل أو فوط تجفيف الأيدى - قفازات شديدة التحمل و ذات الإستخدام الواحد - مريلة بلاستيكية .- نظارات واقية – ماسك - غطاء للرأس ( أوفر هيد ) - سابوه مقفول ."}, {"num": "8", "text": "المنظفات اللازمة ."}, {"num": "9", "text": "مواد كيماوية مثل الخل لمنع إصفرار المنسوجات."}, {"num": "10", "text": "مواد تبييض لكي تعمل على تقليل نشاط الميكروبات التي تتواجد بالمفروشات ."}, {"num": "11", "text": "حاويات لنقل المفروشات الملوثة و النظيفة ."}, {"num": "12", "text": "أرفف خاصة لتخزين  المفروشات النظيفة ."}, {"num": "13", "text": "ترابيزات لفرز المفروشات الملوثة و النظيفة ."}]}, {"title": "بيئـة العمـل :", "items": [{"num": "14", "text": "يتم الإلتزام بإجراءات العمل داخل المغسلة طبقاً لسياسة مكافحة العدوى."}, {"num": "15", "text": "تخزين المفروشات النظيفة :\n يتم التخزين على أرفف أو دواليب أو عربات خاصة بذلك لحين توزيعها على الأقسام \n مكان التخزين نظيف .\n منظم و مرتب ."}, {"num": "16", "text": "يجب الحفاظ على بيئة المغسلة دائماً نظيفة وجافة و خالية من الأتربة."}, {"num": "17", "text": "يتم تطهير  باب الغسالة بعد كل مرة يتم  وضع المفروشات الملوثة بها  ."}]}, {"title": "السجلات :", "items": [{"num": "18", "text": "يوجد سجل لإستلام المفروشات الملوثة من الأقسام."}, {"num": "19", "text": "يوجد سجل تسليم المفروشات النظيفة للأقسام."}, {"num": "20", "text": "يوجد سجل تسليم مفروشات العمليات النظيفة لوحدة التعقيم المركزى."}, {"num": "21", "text": "سجل الصيانة الدورية."}, {"num": "22", "text": "سجل أعطال."}]}]}, {"key": "kitchen", "title": "وحدة التغذية (المطبخ)", "max": 40, "subsections": [{"title": "أولا : تصميم مطبخ المستشفى:", "items": [{"num": "1", "text": "الأقسام المختلفة للمطبخ :     \n مكتب إستقبال و إستلام الأطعمة .\n منطقة تخزين.\n منطقة غسيل الأواني والأدوات. \n منطقة تحضير وتجهيز الطعام.\n منطقة تجهيز وجبات الرايل.\n منطقة الطهي.\n منطقة التوزيع.\n مكان مخصص لتغيير ملابس العاملين بالمطبخ .\n حوض أو أحواض مخصصة لغسل الأيدي ."}]}, {"title": "مسار العمل في المطبخ :", "items": [{"num": "2", "text": "تحديد مسار واضح ومعلن لإيضاح مسار دخول الأطعمة المختلفة وأماكن تخزينها وإعدادها."}, {"num": "3", "text": "الإلتزام بالمسار إلى الأمام وعدم إتخاذ خطوات للرجوع أثناء العمل."}]}, {"title": "ملاحظـــة المستلزمات :", "items": [{"num": "4", "text": "توافر المستلزمات الأساسية  لمكافحة العدوى:\nحوض لغسيل الأيدي - صابون الأيدى و الأرضيات – مناديل أو فوط تجفيف الأيدى - قفازات شديدة التحمل و ذات الإستخدام الواحد - مريلة بلاستيكية .- نظارات واقية – ماسك - غطاء للرأس يغطي شعر الرأس كله - سابوه  مقفول لا يسمح بالإنزلاق و  يمكن غسله - وجود سلة مهملات بغطاء في كل مكان تجهيز."}, {"num": "5", "text": "يوجد أحواض منفصلة لكل من (اللحوم/الخضراوات والفواكه/غسيل الأواني والأدوات/غسيل الأيدي)."}, {"num": "6", "text": "الإلتزام بالألوان القياسية العالمية للسكاكين و البلنشات :  \n الأحمر : للحوم \n الأصفر: للدواجن\n الأزرق : الأسماك\n الأخضر : خضراوات\n الأبيض : الساندويتشات و الجبن"}, {"num": "7", "text": "يوجد ملصق تعريفى على كل وجبة تشمل :  \n الإسم الرباعى للمريض \n رقم الملف\n القسم \n نوع الوجبة.\nبالنسبة  لوجبات الرايل يضاف للملصق التعريفى تاريخ و ساعة تحضير الوجبة"}, {"num": "8", "text": "مراعاة قواعد الصحة العامة للعاملين بالمطبخ."}]}, {"title": "الجداول – القوائم – الشهادات الصحية :", "items": [{"num": "9", "text": "وجود شهادة صحية صالحة بالخلو من الأمراض المعدية تُجدد سنوياً."}, {"num": "10", "text": "وجود جداول تنظيف يومية وأسبوعية وشهرية طبقاً لتعليمات مكافحة العدوى."}, {"num": "11", "text": "الإلتزام بجداول التنظيف اليومي والأسبوعي والشهري مع التوثيق."}, {"num": "12", "text": "توجد قائمة بالوجبات ( دليل الوجبات) تتناسب مع : \n التشخيص \n السن \n النوع"}, {"num": "13", "text": "يتم تسجيل درجات حرارة الثلاجات و المبردات مرتين على الأقل يومياً."}, {"num": "14", "text": "يتم تسجيل درجة حرارة و رطوبة غرفة التخزين الجاف."}, {"num": "15", "text": "وجود سجل  لتسجيل الداخل و الخارج من المخزن يومياً."}, {"num": "16", "text": "وجود جدول لتوزيع الوجبات ."}, {"num": "17", "text": "يتم توزيع الوجبات في الوقت المحدد طبقاً للجدول."}, {"num": "18", "text": "يتم توزيع الأطعمة في عربة نظيفة و مغلقة تحافظ على درجة حرارة الطعام ."}, {"num": "19", "text": "وجود تهوية كافية والتأكد من سلامة ونظافة الشفاطات."}, {"num": "20", "text": "وجود ما يفيد بفحص البيطرى للدواجن و اللحوم."}]}]}, {"key": "morgue", "title": "غرفة حفظ الموتى", "max": 28, "subsections": [{"title": "إشتراطات عامة:", "items": [{"num": "1", "text": "غرفة حفظ الموتى ذات مدخل مستقل بحيث لا يشاهد من باقي أقسام في المستشفى ( يفضل وجود بابين)."}, {"num": "2", "text": "الغرفة سهلة التنظيف و التطهير حيث يجب أن تكون  الحوائط و الأرضيات من السيراميك."}, {"num": "3", "text": "يجب توفير العناصر التالية عند القيام بإجراءات حفظ الموتى فى المستشفى:\nثلاجات حفظ بعدد كافى\nطاولة تغسيل\n حوض لغسيل الأيدى.\nمصدر للصرف مغطى\nمكان  مخصص لحفظ  المعدات\nمصدر للماء البارد والماء الساخن (سخان كهربائى)"}, {"num": "4", "text": "يوجد حاويات نفايات خطرة وحاويات نفايات عادية"}, {"num": "5", "text": "يوجد شبابيك وعليها سلك  معدنى ضيق الفتحات ,ويوجد شفاطات"}, {"num": "6", "text": "ضرورة ربط ثلاجات الموتى على الشبكة الإحتياطية ( المولدات الكهربائية)"}, {"num": "7", "text": "تسجيل درجة حرارة ثلاجة حفظ الموتى يومياً ( 2-4 ) درجة  مئوية."}, {"num": "8", "text": "يجب متابعة جميع الثلاجات/المجمدات وتزويدها بأجهزة إنذار تعمل على مدار 24 ساعة يوميًا."}, {"num": "9", "text": "الإلتزام بالواقيات الشخصية أثناء التعامل مع الجثث."}, {"num": "10", "text": "يوجد سجل لتسليم و تسلم الجثث من الأقسام للغرفة و يشمل على الأقل:\nالتاريخ – الساعة –  القسم - الإسم الرباعى للمريض – رقم الملف – إسم المسلم من القسم ثلاثيا – إسم المستلم بالغرفة ثلاثيا."}, {"num": "11", "text": "يوجد سجل لتسليم و تسلم الجثث من الغرفة لذوى الحالات و يشمل على الأقل:\nالتاريخ – الساعة –  القسم - الإسم الرباعى للمريض – رقم الملف – إسم المسلم من الغرفة  ثلاثيا – إسم المستلم  من ذوى الحالة ( الدرجة الأولى) ثلاثيا- الرقم القومى للمستلم."}, {"num": "12", "text": "يوجد جدول )التنظيف والتطهير) لجميع الأسطح بما فى ذلك الجزء الداخلى للثلاجة."}, {"num": "13", "text": "يتم الإلتزام بجدول )التنظيف والتطهير) مع التوثيق."}, {"num": "14", "text": "يتم إستلام أجزاء الجسم (الولادة الميتة، والأطراف المبتورة، وما إلى ذلك ( في كيس أحمر، و مميز بوضوح بوضع ملصق تعريفى على الكيس ( إسم المريض الرباعى و رقم الملف- القسم - إسم الجزء المستأصل) ، وتخزينها في الثلاجة حتى الدفن."}]}]}, {"key": "waste", "title": "غرفة النفايات", "max": 22, "subsections": [{"title": "5. غرفة النفايات :", "items": [{"num": "1", "text": "وجود غرفة مخصصة للنفايات محكمة الغلق ( مؤمنة)  وعليها لافتة نفايات خطرة."}, {"num": "2", "text": "وضع علامات واضحة على الغرفة توضح ما يحتوي عليه الموقع."}, {"num": "3", "text": "وجود ترخيص تداول النفايات سارى."}, {"num": "4", "text": "وجود عقد ساري للنفايات."}, {"num": "5", "text": "وجود مسئول عن غرفة النفايات على دراية بسياسات العمل."}, {"num": "6", "text": "مواصفات الغرفة:\n الحوائط و الأرضيات من السيراميك لسهولة التنظيف والتطهير.\n مصدر للتهوية.\n يوجد سلك معدنى ضيق على النوافذ لمنع دخــول القوارض والحشرات والطيور والحيوانات الضالة.\n يوجد مصدر للمياه الجارية .\n مصدر للصرف \n حوض لغسيل الأيدي \n ميزان لوزن النفايات\n أدوات  النظافة الملائمة ومواد التطهير لإستعمالها في نظافة الغرفة بصفة مستمرة وعند إنسكاب النفايات.\n ديب فريزر فى حالة حفظ المشيمة."}, {"num": "7", "text": "أكياس النفايات الطبية الخطرة مغلقة جيدا ومعنونة بإسم القسم والوزن والتاريخ"}, {"num": "8", "text": "وجود حاويات لوضع أكياس النفايات."}, {"num": "9", "text": "يوجد سجل تسليم النفايات من القسم لغرفة النفايات و يشمل على الأقل:\nالتاريخ – الساعة – القسم – عدد الأكياس – وزنها – عدد صناديق النفايات الخطرة الحادة – وزنها – إسم المستلم و المسلم ثلاثياً."}, {"num": "10", "text": "يوجد سجل تسليم النفايات من غرفة النفايات لمسئول التخلص النهائى و يشمل على الأقل:\nالتاريخ – الساعة – عدد الأكياس – وزنها – عدد صناديق النفايات الخطرة الحادة – وزنها – إسم المستلم و المسلم ثلاثياً."}, {"num": "11", "text": "توافر الواقيات الشخصية و الإلتزام بها عند تداول النفايات: \nقفازات شديدة التحمل – مريلة بلاستيكة ذات الإستخدام الواحد –  واقى القدم (أحذية برقبة ذات طول مناسب) لحماية الأقدام من التعرض  للسوائل و الأدوات الحادة) – ماسك – غطاء للرأس – نظارة واقية إن أمكن."}]}]}, {"key": "admin", "title": "الإنضباط و الإلتزام الإداري", "max": 58, "subsections": [{"title": "a. الموارد البشرية :", "items": [{"num": "1", "text": "يوجد مسئول عن قسم  الموارد البشرية"}, {"num": "2", "text": "يوجد ملف خاص لكل موظف موضح به جميع البيانات الخاصة به وبيانات\nعن الأداء, يحتوي كل ملف على المستندات التالية :\n نسخة من الشهادات العلمية وترخيص مزاولة المهنة اللازم.\n التعليم والتدريب والسيرة الذاتية.\n التوصيف الوظيفي الحالي.\n ما يثبت حضور برنامج تهيئة الموظف الجديد.\n تقارير التقييم السنوية.\n وثائق أخرى حسب اللوائح والقوانين."}, {"num": "3", "text": "يوجد خطة توظيف تحدث سنويا"}, {"num": "4", "text": "تعمل  المستشفى ( قسم الموارد البشرية) على توفير إحتياجاتها من كفاءات العنصر البشرى و من خلال خطة التوظيف."}, {"num": "5", "text": "ضرورة إخطار وتوقيع العاملين بنتائج التقييم"}, {"num": "6", "text": "نظم لقياس مدى رضا العاملين يتم تنفيذه بصفة دورية مرة كل (6) أشهر."}]}, {"title": "التعليم و التدريب المستمر :", "items": [{"num": "7", "text": "يتوفر نظام تدريبي واضح ومطبق يشمل التدريب الأساسي والتنظيمي والمستمر (برنامج تهيئة العاملين الجدد – التعليم المستمر) يشمل البنود التالية:\n \tتحديد الإحتياجات التدريبية للعاملين\n \tتحديد الفئات المستهدفة\n \tتحديد طرق التدريب\n \tتحديد المدربين\n \tتحديد الموارد المالية الالزمة\n    خطة/جداول زمنية"}, {"num": "8", "text": "توجد لجنة / فريق متخصصة في التدريب وتطوير كفاءة ومهارة العاملين لديها برنامج للتعليم والتدريب المستمر لجميع العاملين.\n تتوفر وثيقة توضح مهام اللجنة / الفريق.\n تتوفر محاضر لإجتماعات اللجنة  أو تقارير نشاط الفريق."}]}, {"title": "السجلات :", "items": [{"num": "9", "text": "توافر السجلات الآتية على الأقل:\n سجل الأجازات\n سجل الترقيات\n سجل الجزاءات\n سجل الإنتدابات والتنقلات\n سجل الوارد والصادر"}, {"num": "10", "text": "يوجد نظام لحفظ المستندات والسجلات والمكاتبات"}, {"num": "11", "text": "العاملون على دراية بالمدة المسموحة لحفظ السجلات والمستندات والمكاتبات."}, {"num": "12", "text": "يتم الإلتزام بالمدة المسموحة لحفظ السجلات والمستندات والمكاتبات مع التوثيق"}]}, {"title": "B. الشئون المالية :", "items": [{"num": "13", "text": "توجد وحدة تنظيمية مختصة في الشئون المالية:\n يتضمن الهيكل التنظيمي وجود وحدة تنظيمية مالية.\n يتوفر هيكل تنظيمي فرعي للوحدة.\n إختصاصات الوحدة محددة"}, {"num": "14", "text": "الموظف القائم بالمهام/المسئول عن هذه الوحدة الإدارية:\n  مؤهل في مجال تخصصه \n له خبرة مناسبة في مجال عمله."}, {"num": "15", "text": "لدى الإدارة المالية القوانين و اللوائح التالية:\n وجود اللائحة المالية للموازنة و الحسابات\n وجود لائحة المناقصات و المزايدات\n وجود لائحة المخازن\n وجود اللائحة المالية الخاصة بالمستشفى"}]}, {"title": "السجلات :", "items": [{"num": "16", "text": "يجب أن تتوافر السجلات التالية :\n سجل حسابات المرضى\n سجل دخول و خروج المرضى\n سجل فواتير المرضى\n سجل التعاقدات\n سجل نفقة الدولة\n سجل إيرادات\n سجل مصروفات\n سجل إرتباطات\n سجل لقيد ممتلكات المستشفى المتمثلة فى الأرض و المباني و السيارات."}, {"num": "17", "text": "تحفظ المستندات والسجلات المالية بطريقة آمنة ومتواصلة ومنظمة:\n يتوفر مكان حفظ المستندات والسجلات بشكل آمن.\n يتم حفظ المستندات والسجلات الخاصة وفق تسلسل منطقي."}, {"num": "18", "text": "يوجد بالمؤسسة موازنة سنوية توضح الآتى :\n وجود خطة تقديرية قبل بداية كل سنة مالية\n تشارك جميع الأقسام فى إعداد الموازنة السنوية"}, {"num": "19", "text": "توجد خطة لإحلال أو تجديد مختلف أصول المنشأة"}, {"num": "20", "text": "يوجد بالمستشفى إدارة أو قسم أو لجنة مشتريات"}]}, {"title": "C . المخازن :", "items": [{"num": "21", "text": "يوجد مسئول يقوم بالإشراف لديه مؤهل مناسب طبقا للتوصيف الوظيفي."}, {"num": "22", "text": "تتبع المستشفى اللوائح و القوانين المنظمة لأعمال المخازن و تشمل :\n توافر لائحة المخازن\n توافر لائحة المناقصات والمزايدات"}, {"num": "23", "text": "تتوفر الإشتراطات اللازمة للمخازن و تشمل على الأقل حيث:\n كافة منشآت المخازن من مواد غير قابلة للإشتعال، ويفضل أن يكون للمخزن أكثر من مخرج واحد .\n توفير فتحات الإضاءة والتهوية الطبيعية المناسبة مـع تزويـدها بسلك صلب مزدوج ضيق .\n جميع التوصيلات والتجهيزات الكهربائية داخل المخازن طبقاً للمواصفات الفنية التي تضمن سلامة المخازن من خطـر الحريق.\n كل مخزن مزود بسكينة خارجية لفصل التيار الكهربائي عند إنتهاء العمل أو في حالات الطوارئ .\n توفير أجهزة ومعـدات الإطفاء التي تتناسب مع المساحات المخصصة لها ونوعية المواد التي سيتم تخزينها بالمخازن ، و توفير نظام الإطفاء التلقائي و وسيلة لإنذار الحريق .\n الأبواب من الأنواع المقاومة للنيران ويجب أن تظل مغلقة بصفة دائمة.\n تقسيم المخازن ذات المساحات الكبيرة إلى وحدات صغيرة وذلك بإقامة فواصل من مواد مقاومة للنيران بحيث يصعب نفاذ الحريق منها .\n تصنيف المواد حسب طبيعتها وخصائصها و وضع ملصق تعريفى لها.\n يحفظ المخزون على قوائم وأرفف معدنية ولا يتم وضعها على الأرض مباشرة لحمايتها من التلف  .\n يمنع التدخين نهائياً داخل المخازن مع وضع ملصقات منع التدخين بمكان ظاهر.\n الصيانة الدورية لأجهزة ومعدات الإطفاء الموجودة بالمخازن."}]}, {"title": "السجلات / النماذج:", "items": [{"num": "24", "text": " سجل عهدة المخزن\n سجل الشطب\n دفتر يومية المخزن\n سجل إجمالي موجودات المخزن والعهد الشخصية\n سجل قيد الأشياء الثمينة\n سجل قيد الفواتير الواردة للمخزن\n سجل قيد الخامات المصروفة\n سجل عهدة المخزن\n نموذج إضافة\n نموذج صرف\n طلب خصم أصناف\n كشف الزيادة والعجز\n طلب إرتجاع الأصناف\n كشف عهدة شخصية\n كشف الإحتياجات السنوية للمستلزمات السلعية\n محضر لجنة الجرد\n كشف إجراءات تتبع الصنف"}, {"num": "25", "text": "يتم حفظ المستندات والسجلات المخزنية بطريقة آمنة ومنظمة"}, {"num": "26", "text": "حفظ الأصناف الكهنة بمخزن مستقل"}, {"num": "27", "text": "ضرورة عمل جرد جزئى وتوثيقه شهرياً,  وكذلك الجرد السنوي."}, {"num": "28", "text": "ضرورة عمل الجرد السنوي وتوثيقه"}, {"num": "29", "text": "يتم إتخاذ اللازم نحو حوادث الفقد والتلف والسرقة وفقا للائحة المخازن واللائحة المالية"}]}]}, {"key": "staff_housing", "title": "سكن الأطباء و التمريض", "max": 10, "subsections": [{"title": "سكن الأطباء و التمريض:", "items": [{"num": "1", "text": "توجد لافتة توضح مكان سكن الأطباء والتمريض"}, {"num": "2", "text": "وجود التجهيزات والأثاث  اللازم."}, {"num": "3", "text": "الإلتزام  بنظافة المكان والسباكة سليمة ."}, {"num": "4", "text": "لا يستخدم السكن فى أغراض أخرى مثل الإحتفاظ برواكد – ادوية – أجهزة طبية – مستلزمات )."}, {"num": "5", "text": "الإضاءة جيدة و سليمة."}]}]}, {"key": "customer_voice", "title": "تقييم و مراقبة أداء الخدمات", "max": 30, "subsections": [{"title": "تقييم و مراقبة أداء الخدمات الصحية المقدمة بالمنشأة Customer Voice :", "items": [{"num": "1", "text": "يوجد صندوق  / صناديق شكاوى للمنشأة: \n العدد\n أماكن توزيع صندوق / صناديق الشكاوى"}, {"num": "2", "text": "يوجد مصادر أخرى للشكاوى غير الصندوق:\n خط ساخن        \n منظومة الشكاوى مجلس الوزراء            \n شكاوى شفويا"}, {"num": "3", "text": "وجود آلية / نظام  لبحث الشكاوى"}, {"num": "4", "text": "توجد لافتات / أسهم  واضحة تشير إلى مكان توافر صندوق / صناديق الشكاوى"}, {"num": "5", "text": "توافر بوسترإعلان يوضح  أرقام و أماكن تلقى الشكاوى المتعلقة بالخدمات المقدمة."}, {"num": "6", "text": "يتم فتح  صندوق الشكاوى  بشكل دورى : \n أسبوعى \n شهرى"}, {"num": "7", "text": "وجود محاضر فتح صندوق الشكاوى وحصر الشكاوى التى بداخله ."}, {"num": "8", "text": "يوجد  تشكيل للجنة الشكاوى معتمد."}, {"num": "9", "text": "يتم إنعقاد اللجنة بشكل دورى ."}, {"num": "10", "text": "يوجد محاضر لتوثيق إنعقاد اللجنة."}, {"num": "11", "text": "توافر نموذج إبلاغ عن شكوى ."}, {"num": "12", "text": "توافر سجل عن  الشكاوى يشمل العناصر التالية على الأقل: \n إسم الشاكى \n رقم التواصل \n الرقم القومى\n مصدر الشكوى\n محتوى الشكوى\n طرق حل الشكوى\n إبلاغ الشاكى بحل الشكوى."}, {"num": "13", "text": "توافر نماذج إستبيان رضاء المرضى عن أداء الخدمات المقدمة / 3 أشهر."}, {"num": "14", "text": "يتم تحليل نتائج إستبيان رضاء المرضى."}, {"num": "15", "text": "وجود  إجراءات متخذة  وموثقة لتحسين نتائج الإستبيان."}]}]}, {"key": "physio", "title": "العلاج الطبيعي", "max": 64, "subsections": [{"title": "الإشتراطات العامة:", "items": [{"num": "1", "text": "يفضل أن يكون المركز في الدور الأرضي ( و إذا تواجد فى طابق علوى لابد من توفير مصعد مناسب لإستخدام ذوي الإحتياجات الخاصة)."}, {"num": "2", "text": "غرفة إنتظار للمرضى."}, {"num": "3", "text": "دورة  مياه للمرضى , و دورة مياه مجهزة لإستخدام ذوي الإحتياجات الخاصة."}, {"num": "4", "text": "تكون الممرات  واسعة والأرضية  غير قابلة للإنزلاق مناسبة لإستخدام ذوي الإحتياجات الخاصة."}, {"num": "5", "text": "صالة تمارين علاجية"}, {"num": "6", "text": "مراعاة الخصوصية  في أماكن العلاج  بوضع فواصل أو ستائر."}, {"num": "7", "text": "لا يجوز القيام بالعلاج الطبيعي لمن لا تسمح حالتهم الصحية بذلك إلا بأمر مكتوب من الطبيب المعالج , و إقرار موافقة مستنيرة من المريض أو ذويه."}, {"num": "8", "text": "مساحة العيادة مناسبة والتجهيزات متوفرة وأن تكون ممراته ومداخله واسعة."}, {"num": "9", "text": "أن تخصص أماكن منفصلة لكل نوع من أنواع العلاج."}, {"num": "10", "text": "يفضل أن يكون المركز في الدور الأرضي ( و إذا تواجد فى طابق علوى لابد من توفير مصعد مناسب لإستخدام ذوي الإحتياجات الخاصة)."}]}, {"title": "التجهيزات اللازمة  طبقاً لنوع الخدمة المقدمة:", "items": [{"num": "11", "text": "أسرة علاجية/ للتدريب و التمارين العلاجية."}, {"num": "12", "text": "جهاز قياس حركة المفاصل (جينيومتر(."}, {"num": "13", "text": "وحدة المعالجة الكهربائية."}, {"num": "14", "text": "مشاية."}, {"num": "15", "text": "جهاز مشاية كهربائي ."}, {"num": "16", "text": "أطقم أحزمة علاجية ( تحريك – مشى)."}, {"num": "17", "text": "المرآة الحائطية و المرآة المتحركة."}, {"num": "18", "text": "المعالجة  بشمع البارافين."}, {"num": "19", "text": "ممارسة الدراجة."}, {"num": "20", "text": "عجلات كتف مثبتة على الحائط."}, {"num": "21", "text": "آلة تقريب / تبعيد الساق."}, {"num": "22", "text": "أوزان الرمال."}, {"num": "23", "text": "الأشعة تحت الحمراء."}, {"num": "24", "text": "الأشعة الفوق بنفسجية."}, {"num": "25", "text": "جهاز تحريك المفصل ."}]}, {"title": "السجلات:", "items": [{"num": "26", "text": "وجود سجل لتسجيل المرضى يشمل على الأقل  البيانات التالية:\nإسم المريض الرباعى -  رقم الملف / الإيصال - السن - عنوانه - تاريخ الزيارة الأولى - الجهة التي أحالته، نوع العلاج الذي أعطي له ( نوع الجلسة)- إسم القائم بالعلاج ( إعطاء الجلسة) -  تاريخ الزيارة القادمة – مواعيد الجلسات(."}, {"num": "27", "text": "يمنح المريض بطاقة يدون فيها: \nإسم المريض الرباعى- رقم الملف / الإيصال -  مواعيد الجلسات - نوع العلاج"}, {"num": "28", "text": "وضع  قائمة  بالخدمات الصحية و أسعارها  في مكان بارز وبخط واضح."}]}, {"title": "مكافحة العدوى بالعلاج الطبيعى:", "items": [{"num": "29", "text": "يتم تنظيف وتطهير معدات العلاج الطبيعي بشكل دوري وبعد كل مريض."}, {"num": "30", "text": "يوجد جدول زمني لأنشطة التنظيف والتطهير."}, {"num": "31", "text": "الإلتزام بغسيل الأيدى ."}, {"num": "32", "text": "وجود كارت تعريف و كارت صيانة دورية لكل جهاز."}]}]}];

        // ═══════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════
        let scores = {};
        let notes = {};
        let meta = { hospital: '', hospitalName: '', type: '', governorate: 'الاسكندرية', inspectors: '', dates: '', result: '' };
        let currentSection = 'home';
        const STORAGE_KEY = 'hosp_insp__v3';

        // ═══════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════
        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocal();
            buildSidebarNav();
            showHome();
            updateProgress();
        });

        // ═══════════════════════════════════════
        // SIDEBAR NAV
        // ═══════════════════════════════════════
        function buildSidebarNav() {
            const el = document.getElementById('sidebarNav');
            let html = `<div class="nav-item ${currentSection === 'home' ? 'active' : ''}" onclick="showHome()">
        <div class="nav-icon ic-summary"></div>
        <div class="nav-text"><div class="nav-title">الصفحة الرئيسية</div></div>
      </div>
      <div class="nav-item ${currentSection === 'summary' ? 'active' : ''}" onclick="showSection('summary')">
        <div class="nav-icon">📈</div>
        <div class="nav-text"><div class="nav-title">ملخص النتائج</div></div>
      </div>`;

            FORM_DATA.forEach(sec => {
                const answered = countAnswered(sec.key);
                const total = countTotal(sec.key);
                const { earned } = getSectionScore(sec.key);
                let pillClass = 'pill-empty', pillText = `0/${total}`;
                if (answered > 0 && answered < total) { pillClass = 'pill-partial'; pillText = `${answered}/${total}` }
                else if (answered === total && total > 0) { pillClass = 'pill-done'; pillText = `✓` }
                const isActive = currentSection === sec.key;
                html += `<div class="nav-item ${isActive ? 'active' : ''}" id="nav-${sec.key}" onclick="showSection('${sec.key}');closeSidebar()">
          <div class="nav-icon ic-${sec.key}"></div>
          <div class="nav-text">
            <div class="nav-title">${sec.title}</div>
            <div class="nav-sub">${sec.max} نقطة · ${sec.subsections.reduce((a, s) => a + s.items.length, 0)} عنصر</div>
          </div>
          <span class="nav-pill ${pillClass}" id="npill-${sec.key}">${pillText}</span>
        </div>`;
            });

            el.innerHTML = html;
        }

        function updateNavItem(key) {
            const el = document.getElementById(`nav-${key}`);
            if (!el) return;
            const answered = countAnswered(key);
            const total = countTotal(key);
            const pill = document.getElementById(`npill-${key}`);
            if (!pill) return;
            let pillClass = 'pill-empty', pillText = `0/${total}`;
            if (answered > 0 && answered < total) { pillClass = 'pill-partial'; pillText = `${answered}/${total}` }
            else if (answered === total && total > 0) { pillClass = 'pill-done'; pillText = '✓' }
            pill.className = `nav-pill ${pillClass}`;
            pill.textContent = pillText;
        }

        // ═══════════════════════════════════════
        // HOME SCREEN
        // ═══════════════════════════════════════
        function showHome() {
            currentSection = 'home';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector('.nav-item')?.classList.add('active');
            document.getElementById('mnHome')?.classList.add('active');
            document.getElementById('mnSummary')?.classList.remove('active');

            const total = FORM_DATA.reduce((a, s) => a + countTotal(s.key), 0);
            const answered = FORM_DATA.reduce((a, s) => a + countAnswered(s.key), 0);
            const pct = total > 0 ? Math.round(answered / total * 100) : 0;

            let navCardsHtml = FORM_DATA.map(sec => {
                const { earned } = getSectionScore(sec.key);
                const pctSec = sec.max > 0 ? Math.round(earned / sec.max * 100) : 0;
                const fillClass = pctSec >= 80 ? 'nc-fill-high' : pctSec >= 50 ? 'nc-fill-mid' : pctSec > 0 ? 'nc-fill-low' : 'nc-fill-zero';
                return `<div class="nav-card" onclick="showSection('${sec.key}')">
          <div class="nc-icon ic-${sec.key}"></div>
          <div class="nc-title">${sec.title}</div>
          <div class="nc-bar"><div class="nc-fill ${fillClass}" style="width:${pctSec}%"></div></div>
          <div class="nc-score">${earned}/${sec.max} · ${pctSec}%</div>
        </div>`;
            }).join('');

            document.getElementById('mainContent').innerHTML = `
        <div class="home-screen">
          <div class="home-hero">

            <div>
              <h1>نموذج متابعة المستشفيات </h1>
              <p>مديرية الشئون الصحية بالاسكندرية - إدارة متابعة المديريات<br>
              تم الإجابة على ${answered} من ${total} عنصر (${pct}%)</p>
            </div>
          </div>

          <div class="meta-card">
            <h2>📝 بيانات المنشأة الطبية</h2>
            <div class="meta-grid">
             <div class="meta-field">
      <label for="governorate">المحافظة</label>
      <input type="text" id="governorate" name="governorate" value="الاسكندرية" readonly class="bg-gray-100 cursor-not-allowed">
</div>
              <div class="meta-field">
      <label for="hospitalName">اسم المستشفى</label>
      <select id="hospitalName" name="hospitalName" onchange="meta.hospitalName=this.value;debounceSave()">
        <option value="">-- اختر المستشفى --</option>
        ${["مستشفى أطفال الرمل", "مستشفى ابو قير المركزى (أ)", "مستشفى اطفال الانفوشى", "مستشفى اطفال فوزى معاذ", "مستشفى الجمهورية العام", "مستشفى الرمد العام", "مستشفى العامريه العام", "مستشفى برج العرب المركزى (ب)", "مستشفى جمال حماده مركزي (أ)", "مستشفى حميات اسكندريه", "مستشفى دار اسماعيل للنساء والتوليد", "مستشفى رأس التين العام", "مستشفى صدر المعموره", "مستشفى صدر كوم الشقافة", "مستشفى صلاح العوضى للنساء والتوليد"]
                    .map(t => `<option value="${t}" ${meta.hospitalName === t ? 'selected' : ''}>${t}</option>`)
                    .join('')}
      </select>
</div>
              <div class="meta-field">
                <label for="type">نوع المستشفى</label>
      <select id="type" name="type" onchange="meta.type=this.value;debounceSave()">
                  <option value="">-- اختر --</option>
                  ${['عام', 'مركزى', 'تخصصى'].map(t => `<option ${meta.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
              </div>
             <div class="meta-field">
      <label for="inspectors">القائم بالتقييم</label>
      <input type="text" id="inspectors" name="inspectors" placeholder="اسم القائم بالمرور" value="${esc(meta.inspectors)}" oninput="meta.inspectors=this.value;debounceSave()">
</div>
              <div class="meta-field">
      <label for="dates">تاريخ التقييم</label>
      <input type="date" id="dates" name="dates" value="${esc(meta.dates)}" oninput="meta.dates=this.value;debounceSave()">
</div>
              <div class="meta-field">
                <label>نتيجة التقييم</label>
                <div id="meta-result-display" style="background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px; font-weight:bold; color:var(--primary);">${esc(meta.result)}</div>
                </div>
            </div>
          </div>

          <div class="quick-actions">
            <button class="qa-btn" onclick="openUploadDialog()">📂 فتح ملف محفوظ سابق</button>
            <button class="qa-btn" onclick="saveToLocal()">💾 حفظ محلي</button>
            <button class="qa-btn" onclick="showSection('summary')">📈 ملخص النتائج</button>
            <button class="qa-btn green" onclick="exportExcel()">📥 تصدير Excel</button>
            <button class="qa-btn" onclick="confirmClear()">🔄 مسح الكل</button>
          </div>

          <div class="nav-grid-title">⚡ انتقل مباشرة إلى أي قسم</div>
          <div class="nav-grid">${navCardsHtml}</div>
        </div>`;
        }

        // ═══════════════════════════════════════
        // SECTION VIEW
        // ═══════════════════════════════════════
        function showSection(key) {
            if (key === 'home') { showHome(); return; }
            if (key === 'summary') { currentSection = 'summary'; buildSidebarNav(); renderSummary(); return; }

            currentSection = key;
            buildSidebarNav();
            document.getElementById('mnHome')?.classList.remove('active');
            document.getElementById('mnSummary')?.classList.remove('active');

            const sec = FORM_DATA.find(s => s.key === key);
            if (!sec) return;

            const { earned } = getSectionScore(key);
            const pct = sec.max > 0 ? Math.round(earned / sec.max * 100) : 0;
            const pctClass = pct >= 80 ? 'pct-high' : pct >= 50 ? 'pct-mid' : pct > 0 ? 'pct-low' : 'pct-zero';
            const pctColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : pct > 0 ? 'var(--red)' : 'var(--text-dim)';

            // Inside showSection(), after building subsections
            let subsHtml = '';
            let itemGlobalIdx = 0;
            sec.subsections.forEach(sub => {
                subsHtml += `<div class="subsec-title">${sub.title}</div><div class="subsec-body">`;
                sub.items.forEach(item => {
                    const ik = `${key}__${itemGlobalIdx}`;
                    const sc = scores[ik];
                    const hasNote = !!notes[ik];
                    let rowClass = '';
                    if (sc === 0) rowClass = 'scored-0';
                    else if (sc === 1) rowClass = 'scored-1';
                    else if (sc === 2) rowClass = 'scored-2';
                    else if (sc === 'NA') rowClass = 'scored-na';

                    // Determine if this item is binary-only
                    const isBinary = item.binaryOnly === true;

                    subsHtml += `
          <div class="item-row ${rowClass}" id="irow-${ik}">
            <div class="item-num">${item.num}</div>

        function setScore(ik, val, secKey) {
            // Binary-only guard: block score 1
            const [secKeyFromIk, idxStr] = ik.split('__');
            const idx = parseInt(idxStr);
            const sec = FORM_DATA.find(s => s.key === secKeyFromIk);
            let item = null;
            let counter = 0;
            if (sec) {
                for (const sub of sec.subsections) {
                    for (const it of sub.items) {
                        if (counter === idx) { item = it; break; }
                        counter++;
                    }
                    if (item) break;
                }
            }
            if (item && item.binaryOnly === true && val === 1) {
                showToast('⚠️ غير مسموح بتقييم جزئي لهذا البند (يُسمح فقط 0 أو 2 أو NA)');
                return;
            }

            // Normal scoring
            scores[ik] = val;
            const row = document.getElementById(`irow-${ik}`);
            if (row) {
                row.className = `item-row${val === 0 ? ' scored-0' : val === 1 ? ' scored-1' : val === 2 ? ' scored-2' : val === 'NA' ? ' scored-na' : ''}`;
                const btns = row.querySelectorAll('.sbtn');

            updateNavItem(secKey);
            updateProgress();

        // ═══════════════════════════════════════
        function getIOSVersion() {
            const ua = navigator.userAgent;
            if (/iP(hone|od|ad)/.test(ua)) {
                const match = ua.match(/OS (\d+)_/);
                if (match) return parseInt(match[1], 10);
            }
            return null; // not iOS
        }

        function shouldUseExternalTemplate() {
            const iosVersion = getIOSVersion();
            // Old iOS (<=15) -> external template (avoids base64 memory spike)
            if (iosVersion !== null && iosVersion <= 15) return true;
            // iOS 16+, Android, Desktop -> base64 (fast, no network needed)
            return false;
        }

            if (shouldUseExternalTemplate()) {
                showToast('⚙️ وضع الأجهزة القديمة مفعّل');
                await new Promise(r => setTimeout(r, 40));
                const response = await fetch('./template.xlsx');
                if (!response.ok) throw new Error('تعذّر تحميل القالب: ' + response.status);
                return new Uint8Array(await response.arrayBuffer());
            }
            showToast('⚡ وضع الأداء السريع');
            await new Promise(r => setTimeout(r, 40));
            const binary = atob(TEMPLATE_B64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes;
        }

        async function zipWrite(files) {
            const lhs = [], cds = [];
            let offset = 0;
            for (const [name, rawData] of Object.entries(files)) {
                const nb = new TextEncoder().encode(name);
                let comp = rawData, cm = 0;
                if (_canCompress) {
                    try {
                        const cs = new CompressionStream('deflate-raw');
                        const writer = cs.writable.getWriter();
                        const reader = cs.readable.getReader();
                        const chunks = [];
                        const pump = () => reader.read().then(({ done, value }) => {
                            if (done) return;
                            chunks.push(value); return pump();
                        });

        // Patch a single cell: preserve s= style attribute, update value
        function patchCell(sheet, cellRef, value) {
            const esc = v => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const repl = (m, attrs) => {
                const a = attrs.replace(/\s*t="[^"]*"/g, '');
                if (value === null || value === '' || value === undefined) return '<c r="' + cellRef + '"' + a + '/>';
                if (typeof value === 'number') return '<c r="' + cellRef + '"' + a + '><v>' + value + '</v></c>';
                return '<c r="' + cellRef + '"' + a + ' t="str"><v>' + esc(value) + '</v></c>';
            };
            // Self-closing: <c r="I13" s="4"/>
            sheet = sheet.replace(new RegExp('<c r="' + cellRef + '"([^/]*)/>'), repl);
            // With content: <c r="I13" s="4" t="s"><v>...</v></c>
            sheet = sheet.replace(new RegExp('<c r="' + cellRef + '"([^>]*)>[\s\S]*?<\/c>'), repl);
            return sheet;
        }

        // Patch sharedString at index: append user value as second rich-text run
        function patchSharedString(ss, index, userValue) {
            const esc = v => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const vRun = '<r><rPr><sz val="16"/><rFont val="Times New Roman"/><family val="1"/></rPr><t xml:space="preserve"> ' + esc(userValue) + '</t></r>';
            let i = -1;
            return ss.replace(/<si>([\s\S]*?)<\/si>/g, (m, inner) => {
                i++;
                return i === index ? '<si>' + inner + vRun + '</si>' : m;
            });
        }

        // Read a cell value from sheet XML
        function readCellValue(sheet, cellRef) {
            const m = sheet.match(new RegExp('<c r="' + cellRef + '"[^>]*>[^<]*<v>([^<]*)<\/v>'));
            return m ? m[1] : '';
        }

        // ═══════════════════════════════════════
        // FILE UPLOAD (load previous inspection)
        // ═══════════════════════════════════════
        function openUploadDialog() {
            document.getElementById('fileInput').click();
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            showToast('جاري قراءة الملف...');
            try {
                const buf = new Uint8Array(await file.arrayBuffer());
                const files = await zipRead(buf);
                const sheet = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
                const ss_xml = new TextDecoder().decode(files['xl/sharedStrings.xml']);

                // Parse shared strings into plain text
                const ssItems = [];
                ss_xml.replace(/<si>([\s\S]*?)<\/si>/g, (m, inner) => {
                    let txt = '';
                    inner.replace(/<t[^>]*>([^<]*)<\/t>/g, (_, t) => { txt += t; });
                    ssItems.push(txt.trim());
                });

                // Column letter helper
                const toCol = c => c <= 26 ? String.fromCharCode(64 + c) :
                    String.fromCharCode(64 + Math.floor((c - 1) / 26)) + String.fromCharCode(64 + ((c - 1) % 26 + 1));

                // Read a cell - returns text value (handles any attribute order)
                const readCell = (r, c) => {
                    const addr = toCol(c) + r;
                    // Match full <c ...>...</c> for this address regardless of attribute order
                    const re = new RegExp('<c\\s[^>]*r=\"' + addr + '\"[^>]*>[\\s\\S]*?<\/c>');
                    const cellMatch = sheet.match(re);
                    if (!cellMatch) return '';
                    const cellXml = cellMatch[0];
                    const vMatch = cellXml.match(/<v>(\d+)<\/v>/);
                    if (!vMatch) return '';
                    if (/\bt="s"/.test(cellXml)) return ssItems[parseInt(vMatch[1])] || '';
                    return vMatch[1];
                };

                // Helper: strip any known label prefix (with or without colon/space)
                const stripLabel = (val, ...labels) => {
                    let v = val;
                    for (const lbl of labels) {
                        v = v.replace(new RegExp(lbl + '\\s*[::؛]?\\s*'), '');
                    }
                    return v.trim();
                };

                const gov = readCell(739, 3);
                meta.governorate = stripLabel(gov, 'المحافظة') || 'الاسكندرية';

                const dates = readCell(739, 6);
                meta.dates = stripLabel(dates, 'تواريخ التقييم', 'تاريخ التقييم', 'تاريخ التقيم', 'تواريخ التقيم');

                const hosp = readCell(740, 3);
                meta.hospitalName = stripLabel(hosp, 'إسم المستشفي', 'اسم المستشفى', 'اسم المستشفي', 'إسم المستشفى');

                const insp = readCell(740, 6);
                meta.inspectors = stripLabel(insp, 'إسم القائم بالتقييم', 'اسم القائم بالتقييم', 'إسم القائم بالتقيم', 'اسم القائم بالتقيم');

                const type = readCell(741, 3);
                meta.type = stripLabel(type, 'نوع المستشفي', 'نوع المستشفى');



                scores = {};
                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(item => {
                        const mapKey = sec.key + '__' + idx;
                        const exRow = ROW_MAP[mapKey];
                        if (exRow) {
                            const getV = col => {
                                const addr = toCol(col) + exRow;
                                const m = sheet.match(new RegExp('<c r="' + addr + '"[^>]*t="str"[^>]*>[^<]*<v>([^<]*)<\/v>'));
                                return m ? m[1] : '';
                            };
                            if (getV(9).trim() === '✓') scores[mapKey] = 0;
                            else if (getV(10).trim() === '✓') scores[mapKey] = 1;
                            else if (getV(11).trim() === '✓') scores[mapKey] = 2;
                            else if (getV(12).trim() === '✓') scores[mapKey] = 'NA';
                            const noteAddr = toCol(13) + exRow;
                            const nm = sheet.match(new RegExp('<c r="' + noteAddr + '"[^>]*>[^<]*<v>([^<]*)<\/v>'));
                            if (nm && nm[1].trim()) notes[mapKey] = nm[1].trim();
                        }
                        idx++;
                    }));
                });
                updateMetaResult();
                saveToLocal();
                buildSidebarNav();
                updateProgress();
                showHome();
                showToast('✓ تم تحميل: ' + (meta.hospitalName || file.name));
            } catch (e) {
                console.error(e);
                showToast('خطأ في قراءة الملف: ' + e.message);
            }
            event.target.value = '';
        }

        async function exportExcel() {
            showToast('جاري تجهيز الملف...');
            await new Promise(r => setTimeout(r, 50)); // yield to UI thread
            try {
                // Load template: external file for iOS ≤15, base64 for iOS 16+ / Android / Desktop
                const templateBuf = await loadTemplateHybrid();

                // Unzip template — preserves ALL files (images, styles, drawings...)
                const files = await zipRead(templateBuf);
                let sheet = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
                let ss = new TextDecoder().decode(files['xl/sharedStrings.xml']);

                showToast('جاري كتابة البيانات...');
                await new Promise(r => setTimeout(r, 30));

                // ── METADATA: patch sharedStrings 737-742 ──
                // Each entry has a bold label run; we append a normal-text value run
                ss = patchSharedString(ss, 737, meta.governorate || '');
                ss = patchSharedString(ss, 738, meta.dates || '');
                ss = patchSharedString(ss, 739, meta.hospitalName || '');
                ss = patchSharedString(ss, 740, meta.inspectors || '');
                ss = patchSharedString(ss, 741, meta.type || '');
                ss = patchSharedString(ss, 742, meta.result || '');
                sheet = patchCell(sheet, 'F741', meta.result || '');

                // ── ITEM SCORES: cols I=9, J=10, K=11, L=12, M=13 ──
                const toCol = c => c <= 26 ? String.fromCharCode(64 + c) : String.fromCharCode(64 + Math.floor((c - 1) / 26)) + String.fromCharCode(64 + ((c - 1) % 26 + 1));
                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(item => {
                        const ik = `${sec.key}__${idx}`;
                        const xRow = ROW_MAP[ik];
                        if (xRow) {
                            // Clear all score columns
                            [9, 10, 11, 12].forEach(c => { sheet = patchCell(sheet, toCol(c) + xRow, ''); });
                            const sc = scores[ik];
                            if (sc === 0) sheet = patchCell(sheet, toCol(9) + xRow, '✓');
                            else if (sc === 1) sheet = patchCell(sheet, toCol(10) + xRow, '✓');
                            else if (sc === 2) sheet = patchCell(sheet, toCol(11) + xRow, '✓');
                            else if (sc === 'NA') sheet = patchCell(sheet, toCol(12) + xRow, '✓');
                            sheet = patchCell(sheet, toCol(13) + xRow, notes[ik] || '');
                        }
                        idx++;
                    }));
                });

                // ── SCORE SUMMARY TABLE (rows 744–775) ──
                let tot0 = 0, tot1 = 0, tot2 = 0, totNA = 0, totEarned = 0, totMax = 0;
                FORM_DATA.forEach(sec => {
                    const xRow = SECTION_ROWS_MAP[sec.key];
                    if (!xRow) return;
                    let c0 = 0, c1 = 0, c2 = 0, cNA = 0, idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(() => {
                        const sc = scores[`${sec.key}__${idx}`];
                        if (sc === 0) c0++; else if (sc === 1) c1++; else if (sc === 2) c2++; else if (sc === 'NA') cNA++;
                        idx++;
                    }));
                    const earned = c1 + c2 * 2, jVal = c2 * 2;
                    const pct = sec.max > 0 ? ((c1 + jVal) / sec.max * 100) : 0;
                    sheet = patchCell(sheet, 'G' + xRow, c0 || '');
                    sheet = patchCell(sheet, 'H' + xRow, c1 || '');
                    sheet = patchCell(sheet, 'J' + xRow, jVal || '');
                    sheet = patchCell(sheet, 'L' + xRow, cNA || '');
                    sheet = patchCell(sheet, 'M' + xRow, pct > 0 ? `${pct.toFixed(1)}%` : '');
                    tot0 += c0; tot1 += c1; tot2 += jVal; totNA += cNA; totEarned += earned; totMax += sec.max;
                });

                // ── GRAND TOTAL ROW 775 ──
                const grandPct = totMax > 0 ? (totEarned / totMax * 100) : 0;
                sheet = patchCell(sheet, 'G775', tot0 || '');
                sheet = patchCell(sheet, 'H775', tot1 || '');
                sheet = patchCell(sheet, 'J775', tot2 || '');
                sheet = patchCell(sheet, 'L775', totNA || '');
                sheet = patchCell(sheet, 'M775', grandPct > 0 ? `${grandPct.toFixed(1)}%` : '');

                // ── PUT BACK & REZIP ──
                files['xl/worksheets/sheet1.xml'] = new TextEncoder().encode(sheet);
                files['xl/sharedStrings.xml'] = new TextEncoder().encode(ss);

                showToast('جاري ضغط الملف...');
                await new Promise(r => setTimeout(r, 30));
                const result = await zipWrite(files);

                // ── DOWNLOAD ──
                const fname = `الاسكندرية_${meta.hospitalName || 'مستشفى'}_${meta.dates || new Date().toISOString().slice(0, 10)}.xlsx`;
                const blob = new Blob([result], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url2 = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url2; a.download = fname;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url2), 10000);
                showToast('✓ تم تصدير الملف بنجاح مع كامل التنسيق');
            } catch (e) {
                console.error(e);
                showToast('خطأ في التصدير: ' + e.message);
            }
        }

        // ═══════════════════════════════════════
        // LOCAL STORAGE
        // ═══════════════════════════════════════
        let saveTimer;
        function debounceSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToLocal, 800); }
        function saveToLocal() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ scores, notes, meta, savedAt: new Date().toISOString() }));
                showToast('✓ تم الحفظ');
            } catch (e) { showToast('تعذر الحفظ'); }
        }
        function loadFromLocal() {
            try {
                const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
                if (d) {
                    scores = d.scores || {};
                    notes = d.notes || {};
                    meta = { ...meta, ...(d.meta || {}) };

                    // Sanitize binary-only items: if they have score 1, reset to 0
                    FORM_DATA.forEach(sec => {
                        let idx = 0;
                        sec.subsections.forEach(sub => sub.items.forEach(item => {
                            if (item.binaryOnly) {
                                const key = `${sec.key}__${idx}`;
                                if (scores[key] === 1) {
                                    scores[key] = 0;
                                }
                            }
                            idx++;
                        }));
                    });

                    // Recalculate result after sanitization
                    updateMetaResult();

                    // Optional: refresh the current view if needed (e.g., rebuild sidebar, update progress)
                    buildSidebarNav();
                    updateProgress();
                    if (currentSection !== 'home' && currentSection !== 'summary') {
                        showSection(currentSection);
                    } else if (currentSection === 'home') {
                        showHome();
                    } else if (currentSection === 'summary') {
                        renderSummary();
                    }

                    showToast('تم استعادة البيانات المحفوظة');
                }
            } catch (e) { }
        }
        function confirmClear() {
            openModal('مسح جميع البيانات', 'هل أنت متأكد؟ سيتم حذف جميع التقييمات والملاحظات.', () => {
                scores = {}; notes = {}; meta = { hospital: '', hospitalName: '', type: '', governorate: 'الاسكندرية', inspectors: '', dates: '', result: '' };
                localStorage.removeItem(STORAGE_KEY);
                buildSidebarNav(); updateProgress(); showHome(); showToast('تم مسح البيانات');
            });
        }

        // ═══════════════════════════════════════
        // MODAL / TOAST
        // ═══════════════════════════════════════
        let _mcb = null;
        function openModal(title, body, cb) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = body;
            _mcb = cb;
            document.getElementById('modalBg').classList.add('open');
            document.getElementById('modalConfirm').onclick = () => { closeModal(); if (_mcb) _mcb(); };
        }
        function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
        let _toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ═══════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

    </script>


<script>
    // Install banner - runs after DOM is ready
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const btnInstall = document.getElementById('btnInstall');
    const btnCancel = document.getElementById('btnCancel');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';

        btnInstall.addEventListener('click', () => {
            installBanner.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                } else {
                    console.log('User dismissed the install prompt');
                }
                deferredPrompt = null;
            });
        });
    });

    btnCancel.addEventListener('click', () => {
        installBanner.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
        installBanner.style.display = 'none';
    });
</script>

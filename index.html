<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="إدارة متابعة المديريات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a6faf">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // Use './sw.js' to ensure it looks in the current folder
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.update();
            }).catch(err => console.log("SW Register Error:", err));
        });
    }
</script>
<title>نموذج متابعة المستشفيات </title>
<style>
/* Offline Arabic font stack - works without internet */
body { font-family: 'Segoe UI', 'Arial Unicode MS', 'Tahoma', 'Arial', sans-serif; }
</style>
<style>
    :root {
        --primary: #1a6faf;
        --primary-dark: #14578a;
        --primary-light: #e8f2fb;
        --primary-mid: #c6dff5;
        --accent: #e8a020;
        --accent-light: #fef3dc;
        --green: #1a8a4a;
        --green-light: #e3f5eb;
        --red: #c0392b;
        --red-light: #fdecea;
        --orange: #d35400;
        --orange-light: #fef0e7;
        --bg: #f0f4f8;
        --surface: #ffffff;
        --surface2: #f7f9fc;
        --border: #d4dde8;
        --border-light: #e8eef5;
        --text: #1a2533;
        --text-muted: #5a6a7e;
        --text-dim: #8a9ab0;
        --shadow-sm: 0 1px 4px rgba(26,111,175,0.08);
        --shadow: 0 2px 12px rgba(26,111,175,0.12);
        --shadow-lg: 0 4px 24px rgba(26,111,175,0.15);
        --radius: 12px;
        --radius-sm: 8px;
        --header-h: calc(60px + env(safe-area-inset-top, 0px));
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --mob-nav-h: calc(58px + var(--safe-area-bottom));
    }

/* Reset & Base */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  
  min-height: -webkit-fill-available;
}
body.menu-open {
  overflow: hidden; /* lock scroll ONLY when menu open */
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  font-size: 14px;
}

.app-layout {
  min-height: -webkit-fill-available;
}

/* ========== HEADER ========== */
.app-header {
  position: fixed;
  top: 0;
  right: 0;
  left: 0;
  height: var(--header-h);
  background: var(--primary);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: env(safe-area-inset-top, 0px) 16px 0 16px;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.header-logo .icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-titles {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.header-titles .t1 {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-titles .t2 {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: none;
}

@media (min-width: 600px) {
  .header-titles .t2 { display: block; }
}

.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

.hbtn {
  height: 34px;
  padding: 0 12px;
  border-radius: 7px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  white-space: nowrap;
}

.hbtn-ghost { background: rgba(255, 255, 255, 0.15); color: #fff; }
.hbtn-ghost:hover, .hbtn-ghost:active { background: rgba(255, 255, 255, 0.25); }
.hbtn-white { background: #fff; color: var(--primary); }
.hbtn-white:hover, .hbtn-white:active { background: #e8f2fb; }
.hbtn-green { background: #27ae60; color: #fff; }
.hbtn-green:hover, .hbtn-green:active { background: #1e9050; }
.hbtn-accent { background: var(--accent); color: #fff; }
.hbtn-accent:hover, .hbtn-accent:active { background: #c8881a; }
.hbtn .icon-sm { font-size: 14px; }

@media (max-width: 599px) {
  .hbtn-desktop { display: none; }
}

/* ========== GLOBAL PROGRESS ========== */
.global-progress {
  position: fixed;
  top: var(--header-h);
  right: 0;
  left: 0;
  height: 4px;
  background: var(--primary-mid);
  z-index: 199;
}

.global-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s;
}

/* ========== LAYOUT ========== */
.app-layout {
  position: fixed;
  top: calc(var(--header-h) + 4px);
  bottom: var(--mob-nav-h);
  right: 0;
  left: 0;
  display: flex;
}

@media (min-width: 768px) {
  .app-layout { bottom: 0; }
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s ease-in-out;
}

.sidebar-inner {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }




@media (max-width: 360px) {
  .sidebar {
    width: 85%;
    max-width: 280px;
    min-width: 240px;
  }
}

.sidebar-head {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border-light);
  background: var(--primary-light);
  flex-shrink: 0;
}

.sidebar-head h3 {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sidebar-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  flex-wrap: wrap;
  gap: 6px;
}

.sidebar-total .score-big { font-size: 20px; font-weight: 900; color: var(--primary); }
.sidebar-total .score-max { font-size: 12px; color: var(--text-muted); }
.sidebar-total .pct-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 12px;
  background: var(--primary-light);
  color: var(--primary);
  white-space: nowrap;
}

/* Navigation Items */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.12s;
  position: relative;
  min-height: 44px;
}

.nav-item:hover { background: var(--primary-light); }
.nav-item.active {
  background: var(--primary-light);
  border-right: 3px solid var(--primary);
}

.nav-item .nav-icon {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.nav-item.active .nav-icon { background: var(--primary); color: #fff; }
.nav-item .nav-text { flex: 1; min-width: 0; }
.nav-item .nav-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
.nav-item.active .nav-title { color: var(--primary); }
.nav-item .nav-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

.nav-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}

.pill-done { background: var(--green-light); color: var(--green); }
.pill-partial { background: var(--orange-light); color: var(--orange); }
.pill-empty { background: var(--border-light); color: var(--text-dim); }

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  padding: 16px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.main-content {
  overscroll-behavior-y: contain;
}


    

.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========== HOME SCREEN ========== */
.home-screen { max-width: 900px; margin: 0 auto; }

.home-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-radius: var(--radius);
  padding: 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.home-hero .hero-icon { font-size: 40px; }
.home-hero h1 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.home-hero p { font-size: 13px; opacity: 0.85; line-height: 1.6; }

/* Upload Card */
.upload-card {
  background: var(--surface);
  border: 2px dashed var(--primary-mid);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 20px;
}

.upload-card:hover, .upload-card.drag-over {
  border-color: var(--primary);
  background: var(--primary-light);
}

.upload-card .up-icon { font-size: 32px; margin-bottom: 8px; }
.upload-card h3 { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.upload-card p { font-size: 12px; color: var(--text-muted); }
#fileInput { display: none; }

/* Meta Card */
.meta-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.meta-card h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 499px) {
  .meta-grid { grid-template-columns: 1fr; }
}

.meta-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.meta-field input, .meta-field select {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  transition: border-color 0.15s;
}

.meta-field input:focus, .meta-field select:focus {
  outline: none;
  border-color: var(--primary);
  background: #fff;
}

.meta-field select option { background: #fff; }

/* Nav Grid */
.nav-grid-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.nav-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-decoration: none;
  min-height: 44px;
}

.nav-card:hover, .nav-card:active {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.nav-card .nc-icon { font-size: 22px; }
.nav-card .nc-title { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.4; }
.nav-card .nc-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-card .nc-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.nc-fill-high { background: var(--green); }
.nc-fill-mid { background: var(--orange); }
.nc-fill-low { background: var(--red); }
.nc-fill-zero { background: var(--border); }
.nav-card .nc-score { font-size: 11px; color: var(--text-muted); }

/* ========== SECTION VIEW ========== */
.section-view { max-width: 900px; margin: 0 auto; }

.section-title-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.stb-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.stb-text { flex: 1; }
.stb-text h2 { font-size: 16px; font-weight: 800; color: var(--primary); }
.stb-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.stb-score { text-align: center; flex-shrink: 0; }
.stb-score .big { font-size: 24px; font-weight: 900; color: var(--primary); }
.stb-score .small { font-size: 12px; color: var(--text-muted); }
.stb-score .pct {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  margin-top: 3px;
}

/* Legend */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--text-muted);
}

.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-2 { background: var(--green); }
.dot-1 { background: var(--orange); }
.dot-0 { background: var(--red); }
.dot-na { background: var(--text-dim); }

/* Subsections */
.subsec-title {
  background: var(--primary-light);
  border: 1px solid var(--primary-mid);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 14px;
}

.subsec-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}

/* Item Row */
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.12s;
}

.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--surface2); }
.item-row.scored-2 { border-right: 3px solid var(--green); }
.item-row.scored-1 { border-right: 3px solid var(--orange); }
.item-row.scored-0 { border-right: 3px solid var(--red); }
.item-row.scored-na { border-right: 3px solid var(--text-dim); }

.item-num {
  min-width: 26px;
  height: 26px;
  background: var(--primary-light);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  flex-shrink: 0;
  margin-top: 1px;
}

.item-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  min-width: 0;
}

.item-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-start;
}

/* Score Buttons */
.sbtn, .sbtn-disabled {
  width: 38px;
  height: 34px;
  border: 2px solid var(--border);
  border-radius: 7px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.sbtn {
  background: var(--surface2);
  color: var(--text-muted);
  cursor: pointer;
}

.sbtn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.sbtn:active { transform: scale(0.94); }

.sbtn.s0 { background: var(--red-light); border-color: var(--red); color: var(--red); }
.sbtn.s1 { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
.sbtn.s2 { background: var(--green-light); border-color: var(--green); color: var(--green); }
.sbtn.sna { background: var(--border-light); border-color: var(--text-dim); color: var(--text-dim); }

.sbtn-disabled {
  background: #2c2c2c;
  border-color: #333;
  color: #aaa;
  cursor: not-allowed;
  opacity: 0.6;
  pointer-events: none;
}

/* Note Button */
.nbtn {
  height: 34px;
  padding: 0 8px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.12s;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  gap: 3px;
}

.nbtn:hover, .nbtn:active { border-color: var(--accent); color: var(--accent); }
.nbtn.has-note { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Note Area */
.note-area { padding: 0 14px 10px 14px; display: none; }
.note-area.open { display: block; }
.note-area textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  resize: vertical;
  min-height: 60px;
}
.note-area textarea:focus { outline: none; border-color: var(--accent); }

/* ========== SUMMARY ========== */
.summary-view { max-width: 900px; margin: 0 auto; }

.total-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.total-card .tc-left { flex: 1; min-width: 160px; }
.total-card h2 { font-size: 16px; font-weight: 800; }
.total-card p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.total-card .tc-right { text-align: center; }
.total-card .tc-score { font-size: 48px; font-weight: 900; line-height: 1; }
.total-card .tc-max { font-size: 14px; opacity: 0.75; margin-top: 4px; }
.total-card .tc-pct {
  font-size: 22px;
  font-weight: 800;
  margin-top: 8px;
  background: rgba(255, 255, 255, 0.2);
  padding: 4px 14px;
  border-radius: 20px;
  display: inline-block;
}

.sum-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.sum-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.sum-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.sum-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.sum-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.sum-scores { display: flex; align-items: center; justify-content: space-between; }
.sum-earned { font-size: 20px; font-weight: 900; color: var(--primary); }
.sum-max { font-size: 12px; color: var(--text-muted); }
.sum-pct { font-size: 13px; font-weight: 700; }

    /* ========== MOBILE BOTTOM NAV ========== */
    .mobile-nav {
        position: fixed;
        bottom: 0;
        right: 0;
        left: 0;
        /* Use the variable we defined in :root */
        height: var(--mob-nav-h);
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        z-index: 1000;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
        /* This is the key: it pushes the content of the nav up */
        padding-bottom: var(--safe-area-bottom);
        align-items: center;
    }

@media (min-width: 768px) {
  .mobile-nav { display: none; }
}

.mobile-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Cairo', sans-serif;
  transition: color 0.15s;
  touch-action: manipulation;
}

.mobile-nav-btn.active { color: var(--primary); }
.mobile-nav-btn .mn-icon { font-size: 20px; }
.mobile-nav-btn .mn-label { font-size: 10px; font-weight: 600; }

/* ========== SIDEBAR OVERLAY ========== */
/* ===== SIDEBAR OVERLAY ===== */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 140;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}

.sidebar-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

    /* ========== FIXED MOBILE LAYOUT ========== */
    @media (max-width: 767px) {
        .app-layout {
            position: fixed;
            top: var(--header-h);
            /* Set bottom to 0 to allow the background to fill the screen */
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            height: auto;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            /* IMPORTANT: This padding must be larger than the height of your bottom nav.
           We add 120px to ensure the rating buttons and notes clear the bar. */
            padding-bottom: calc(var(--mob-nav-h) + 120px) !important;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .sidebar {
            position: fixed;
            top: var(--header-h);
            /* Ensure the sidebar doesn't go behind the bottom nav */
            bottom: var(--mob-nav-h);
            right: 0;
            width: 280px;
            z-index: 150;
            transform: translate3d(100%, 0, 0);
            transition: transform .28s cubic-bezier(.4, 0, .2, 1);
            will-change: transform;
        }

            .sidebar.open {
                transform: translate3d(0, 0, 0);
            }
    }


/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  border-radius: 24px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 500;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  white-space: normal;
  max-width: 90%;
  text-align: center;
}

@media (min-width: 768px) {
  .toast { bottom: 24px; }
}

.toast.show { opacity: 1; }

/* ========== MODAL ========== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 400;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-bg.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
}

.modal h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.modal p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }

.btn {
  flex: 1;
  height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-ghost { background: var(--border-light); color: var(--text-muted); }
.btn-ghost:hover { background: var(--border); }

/* ========== NAVIGATION BUTTONS ========== */
.sec-nav {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.sec-nav-btn {
  flex: 1;
  min-width: 120px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-muted);
}

.sec-nav-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.sec-nav-btn.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.sec-nav-btn.primary:hover { background: var(--primary-dark); }

/* ========== QUICK ACTIONS ========== */
.quick-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.qa-btn {
  flex: 1;
  min-width: 100px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.qa-btn:hover, .qa-btn:active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}

.qa-btn.green { border-color: var(--green); color: var(--green); }
.qa-btn.green:hover { background: var(--green-light); }

/* ========== RESPONSIVE STYLES ========== */
@media (max-width: 599px) {
  .item-row { flex-wrap: wrap; }
  .item-controls { width: 100%; margin-top: 6px; }
  .sbtn { width: 44px; height: 38px; font-size: 14px; }
  .nbtn { height: 38px; font-size: 12px; flex: 1; justify-content: center; }
}

@media (max-width: 480px) {
  body { font-size: 13px; }
  .item-text { font-size: 12px; }
  .stb-text h2 { font-size: 14px; }
}

/* ========== TOUCH TARGETS ========== */
button, .nav-item, .nav-card, .qa-btn, .sec-nav-btn, .mobile-nav-btn, .hbtn {
  min-height: 44px;
}

		const FORM_DATA = [{"key": "general", "title": "الإشتراطات العامة", "max": 110, "subsections": [{"title": "1. النظام الصحي والخدمات:", "items": [{"num": "1", "text": "لافتة بالخدمات المقدمة في المستشفى معلنة و محدثة و معتمدة."}, {"num": "2", "text": "لافتة رئيسية  بأسعار الخدمات المقدمة معلنة و محدثة و معتمدة و لها مرجع."}, {"num": "3", "text": "لافتة فرعية  بأسعار الخدمات المقدمة  معلنة و محدثة و معتمدة و لها مرجع:\n المعمل \n الأشعة  \n الأسنان\n أماكن أخرى"}, {"num": "4", "text": "لافتة موضح بها توزيع وتقسيمات وحدات المبنى الداخلية بالتفصيل كل طابق على حدة ."}]}, {"title": "2. القيادة والإدارة:", "items": [{"num": "5", "text": "يوجد هيكل تنظيمي بالمسمى الوظيفى و الأسماء معلن و محدث و معتمد."}, {"num": "6", "text": "يوجد توصيف وظيفي لجميع العاملين و جميع المسميات الوظيفية بالمستشفى."}, {"num": "7", "text": "جميع العاملين على علم و دراية تامة بالتوصيف الوظيفي ."}, {"num": "8", "text": "نسخة  من الخطة الإستراتيجية العامة للمستشفى طبقاً لإستراتيجية الصحة.", "binaryOnly": true}, {"num": "9", "text": "نسخة من خطة العمل التشغيلية .", "binaryOnly": true}]}, {"title": "3. تنظيم العمل :", "items": [{"num": "10", "text": "تواجد جداول عمل تنظيمية على مدار 24 ساعة لجميع العاملين بجميع أقسام المستشفى."}, {"num": "11", "text": "تواجد العاملون طبقا لجداول العمل التنظيمية  بكل قسم."}, {"num": "12", "text": "يوجد رئيس لكل وحدة / قسم له مهام ومسئوليات محددة  ( أمر تكليف موثق و معتمد)."}, {"num": "13", "text": "يلتزم جميع العاملين بالزى الخاص بهم  ."}, {"num": "14", "text": "يلتزم جميع العاملين بوضع بادج تعريف موضح فيه : الإسم والقسم والصورة"}, {"num": "15", "text": "يوجد مواصفات دخول و خروج معتمدة و متاحة للفريق الطبى لكل من :\n العناية المركزة\n وحدة الأطفال المبتسرين\n وحدة الغسيل الكلوى\n وحدة الحروق إن وُجدت.", "binaryOnly": true}, {"num": "16", "text": "وثيقة حقوق و واجبات المرضي واضحة ومعلنة و محدثة.", "binaryOnly": true}, {"num": "17", "text": "ملصقات منع التدخين معلنة و مطبقة بجميع الأماكن بالمستشفى."}]}, {"title": "4. البنية التحتية العامة بالمستشفى :", "items": [{"num": "18", "text": "حجرات المنشأة الطبية جيدة التهوية والإضاءة"}, {"num": "19", "text": "المنشأة مزودة بوسائل تغذيتها بالمياه النقية بصفة مستمرة"}, {"num": "20", "text": "المنشأة مزودة بوسائل الصرف الصحى المناسبة و السليمة"}, {"num": "21", "text": "تزود المنشأة بالوسائل والأدوات الصحية اللازمة للتخلص من القمامة والفضلات"}, {"num": "22", "text": "تزود المنشأة بالأجهزة اللازمة لإطفاء الحريق"}, {"num": "23", "text": "شهادة من إدارة الدفاع المدنى والحريق بتوفر الإشتراطات اللازمة للحماية من الحريق"}, {"num": "24", "text": "طفاية لكل (30) متر مربع ."}, {"num": "25", "text": "شهادة تداول المواد والنفايات الخطرة"}, {"num": "26", "text": "ما يفيد التعاقد مع محرقة للنفايات الطبية", "binaryOnly": true}, {"num": "27", "text": "تزود كل غرفة من غرف المرضى بالمنشأة:\n بأثاث سهل التنظيف لا يعوق التهوية والإضاءة \n لاتقل المساحة المخصصة لكل سرير عن 9 متر \n دورة مياه وحمام لكل عشرة أسرة على الأكثر فى حالة عدم تزويد الغرفة بدورة مياه مستقلة", "binaryOnly": true}, {"num": "28", "text": "توجد محطة تمريضية تسمح بمراقبة جميع المرضي : \n \tأثاث لحفظ الملفات و السجلات ( المفتوحة) مؤمن. \n \tأثاث لحفظ الأدوية \n \tأثاث لحفظ المهمات و الآلات الطبية اللازمة للعمل التمريضي"}, {"num": "29", "text": "توافر حوض مخصص  لغسيل الأيدي به :\n معنون بحوض غسيل الأيدى\n مستلزمات غسيل الأيدى\n ملصقات اللحظات الخمس و بوستر غسيل الأيدى ( و فى حالة عدم توافر حوض يوضع بوستر الدلك بالكحول)."}, {"num": "30", "text": "توفر الخصوصية عن طريق فواصل بين الأسرة سهلة التنظيف و التطهير طبقاً لتعليمات مكافحة العدوى."}, {"num": "31", "text": "يتم عمل الصيانة الدورية / التصحيحية لجميع الأجهزة"}, {"num": "32", "text": "التوصيلات الكهربائية يجب أن تكون سليمة و داخل مواسير عازلة مركبة داخل الحوائط"}, {"num": "33", "text": "يوجد كارت  تعريف و كارت صيانة لكل جهاز ."}, {"num": "34", "text": "تدعم المستشفى حق المريض في التقدم بشكوى شفوية أو مكتوبة، موقعة أو غير موقعة:\n توجد صناديق أو مكتب لتلقي الشكاوى.\n وثيقة حقوق المريض تشمل هذا الحق.\n توجد لجنة أو جهة لفحص الشكاوى.\n يوجد سجل للشكاوى يتضمن إجراءات تصحيحية يتم إتخاذهافي الشكاوى."}]}, {"title": "5. التراخيص :", "items": [{"num": "35", "text": "ترخيص الأشعة"}, {"num": "36", "text": "الغسيل الكلوى", "binaryOnly": true}, {"num": "37", "text": "قسطرة القلب", "binaryOnly": true}, {"num": "38", "text": "تداول النفايات", "binaryOnly": true}, {"num": "39", "text": "بنك الدم", "binaryOnly": true}, {"num": "40", "text": "المولدات الكهربائية", "binaryOnly": true}, {"num": "41", "text": "المصاعد", "binaryOnly": true}]}, {"title": "6. العقود :", "items": [{"num": "42", "text": "الصيانة الدورية للأجهزة", "binaryOnly": true}, {"num": "43", "text": "النفايات", "binaryOnly": true}, {"num": "44", "text": "صورة من التعاقد مع العاملين", "binaryOnly": true}, {"num": "45", "text": "شركة أمن", "binaryOnly": true}, {"num": "46", "text": "شركة نظافة"}]}, {"title": "7. النظافة :", "items": [{"num": "47", "text": "تتوافر بكل لقسم معدات و مستلزمات النظافة", "binaryOnly": true}, {"num": "48", "text": "توجد جداول للتنظيف والتطهير اليومي وبعد خروج المريض والدوري"}, {"num": "49", "text": "العاملون علي علم بالطريقة الصحيحة لتنظيف وتطهير أسطح العمل"}, {"num": "50", "text": "يلتزم عمال النظافة بالزى الرسمي لهم مع وجود بادج تعريف لكل منهم"}, {"num": "51", "text": "يرتدي عمال النظافة المستلزمات الواقية أثناء التنظيف"}, {"num": "52", "text": "يتم التعامل مع الإنسكابات الدموية وفقا لتعليمات مكافحة العدوى"}, {"num": "53", "text": "دورات المياه نظيفة وصالحة للإستخدام"}, {"num": "54", "text": "لا توجد حشرات زاحفة أو طائرة  و حيوانات ضالة."}, {"num": "55", "text": "جميع النوافذ مركب عليها شبك (سلك) معدني ضيق الفتحات."}]}]}, {"key": "policies", "title": "السياسات و الإجراءات", "max": 8, "subsections": [{"title": "السياسات و الإجراءات :", "items": [{"num": "1", "text": "يوجد السياسات و الإجراءات الآتية محدثة و مفعلة :  \nسياسات الجودة على سبيل المثال: \nالسياسات العامة لسلامة و أمان المريض - إدارة و سلامة الدواء – الجراحة الآمنة – الجودة و تحسين الأداء – الرعاية المتمركزة حول المريض – الرعاية المتكاملة - ........ إلخ.", "binaryOnly": true}, {"num": "2", "text": "سياسات مكافحة العدوى على سبيل المثال:\nغسيل و تطهير الأيدى - إحتياطات العزل وفقاً لطرق إنتقال العدوى المحتملة – سياسات التعقيم – التعامل مع المفروشات- الواقيات الشخصية – الوخز الآمن –فصل النفايات – تطهير البيئة - ...............إلخ.", "binaryOnly": true}, {"num": "3", "text": "السياسات التمريضية  على سبيل المثال:\nرعاية التمريضية لمرضى الجهاز التنفسى الصناعى- العلاج بالأكسجين – العلامات الحيوية – الرعاية التمريضية بالأطفال المبتسرين – الرعاية التمريضية بالمرضى قبل و بعد العمليات – مرضى السكر و الضغط – \nفرز و تصنيف المرضى - ...... إلخ.", "binaryOnly": true}, {"num": "4", "text": "الفريق الطبى مدرب على هذه السياسات مع التوثيق بسجل التدريب."}]}]}, {"key": "protocols", "title": "بروتوكولات العمل", "max": 10, "subsections": [{"title": "بروتوكولات العمل:", "items": [{"num": "1", "text": "يتوافر بروتوكول العمل بكل قسم / وحدة", "binaryOnly": true}, {"num": "2", "text": "بروتوكول الألم", "binaryOnly": true}, {"num": "3", "text": "برتوكول الوقاية من الجلطات الوريدية الدموية VTE", "binaryOnly": true}, {"num": "4", "text": "وجود بروتوكول محدد للتعامل مع  و علاج مرضى الحروق", "binaryOnly": true}, {"num": "5", "text": "الفريق الطبى  مدرب على هذه البروتوكولات مع التوثيق بسجل التدريب."}]}]}, {"key": "committees", "title": "لجان المستشفى", "max": 6, "subsections": [{"title": "لجان المستشفى:", "items": [{"num": "1", "text": "قرار تشكيل كل لجنة محدث و معتمد و لكل تشكيل مرجعية ( على الأقل):\n لجنة الجودة و سلامة المرضى و تحسين الأداء.\n لجنة الدواء\n لجنة مكافحة العدوى \n لجنة السلامة البيئية\n لجنة المراضة و الوفيات\n لجنة الهيئة الطبية\n لجنة الرعاية المتمركزة حول المريض"}, {"num": "2", "text": "المهام والمسئوليات لكل لجنة."}, {"num": "3", "text": "محاضر إجتماع كل لجنة بصفة دورية و تشمل : \nتوقيع الحضور فعليا – أجندة الإجتماع و ما تم مناقشته – التوصيات و تشمل المسئول عن تنفيذ كل توصية – المدة الزمنية للتنفيذ – معوقات عدم التنفيذ."}]}]}, {"key": "medical_records", "title": "التسجيل الطبى", "max": 16, "subsections": [{"title": "الملفات الطبية:", "items": [{"num": "1", "text": "يوجد ملف طبى و رقم موحد لكل مريض"}, {"num": "2", "text": "يتم إستكمال جميع نماذج الملف الطبى و التمريضى بدقة"}, {"num": "3", "text": "يكتب تاريخ و ساعة  كتابة كافة مدخلات السجل الطبي"}, {"num": "4", "text": "تحديد القائم بكتابة مدخلات السجل الطبي بذكر إسمه الثلاثى له بوضوح ( ممنوع الفورمة و الكلاشيه لا يغنى عن التوقيع)."}, {"num": "5", "text": "يلتزم الفريق الطبي بتسجيل العلاج والتعليمات في المكان المحدد لذلك"}, {"num": "6", "text": "كل  صفحة من السجل الطبى تحتوى على إسم المريض الرباعى و الرقم الطبى الموحد."}, {"num": "7", "text": "كافة مدخلات السجل الطبي واضحة و مقروءة و بدون كشط و بدون إستخدام corrector ."}, {"num": "8", "text": "يحتوى كل ملف طبى على النماذج الأساسية  الآتية على الأقل:\n نموذج البيانات الديموجرافية للمريض \n نموذج الموافقة على دخول المستشفى / ممتلكات المريض / حقوق و واجبات المريض.\n نموذج افحص الشامل و التاريخ المرضى\n خطة الرعاية الطبية \n أوامر الطبيب \n ملاحظات الطبيب لتقدم الحالة\n نموذج الإستشارة\n نموذج وصف / تنفيذ  العلاج\n التقييمات التمريضة ( المبدئى – السقوط – الجلد – التغذوى- الألم - ......)\n خطة العناية التمريضية\n قياس العلامات الحيوية\n الملاحظات التمريضية \n تسليم و تسلم الحالات ( أطباء - مريض)\n التثقيف الصحى للمريض ( أطباء – تمريض).\n ملخص الخروج\n نموذج الإبلاغ عن الأحداث الغير متوقعة OVR"}]}]}, {"key": "registers", "title": "السجلات", "max": 4, "subsections": [{"title": "السجلات :", "items": [{"num": "1", "text": "توافر السجلات الآتية على الأقل :\n توافر السجلات التمريضية\n سجل التدريب."}, {"num": "2", "text": "يتم التسجيل بجميع السجلات بطريقة صحيحة و واضحة و بدقة."}]}]}, {"key": "consents", "title": "الإقرارات", "max": 4, "subsections": [{"title": "اٌلإقرارات:", "items": [{"num": "1", "text": "جميع الإقرارات الطبية بالملف الطبى متوفرة: ( على الأقل)\n نموذج إقرار الموافقة على دخول مستشفى \n الموافقة على إجراءعملية  جراحية\n الموافقة على إجراء عالى الخطورة\n الموافقة على التخدير\n الموافقة على نقل دم \n إقرار بالإصابة بقرح الفراش \n إقرار رفض العلاج / رفض إجراء تداخلى\n الموافقة على إجراء غسيل كلوى"}, {"num": "2", "text": "يتم التسجيل بجميع الإقرارات الطبية بالملف الطبى بدقة"}]}]}, {"key": "icu", "title": "وحدة العناية المركزة", "max": 74, "subsections": [{"title": "البنية التحتية بوحدة العناية المركزة: لابد أن تتوافر الشروط الآتية في وحدات الرعاية المركزة:", "items": [{"num": "1", "text": " يتوافر الإتصال السهل بأقسام الطوارئ و العمليات و المعامل و الأشعة"}, {"num": "2", "text": " المسافة بين كل سرير من 5, 2- 3 متر"}, {"num": "3", "text": " الأرضيات مغطاة بمادة سهلة التنظيف و مانعة للانزلاق و مانعة لتكوين الشحنات الكهربية الاستاتيكية"}, {"num": "4", "text": " الحوائط مغطاة بمادة سهلة الغسل و الزوايا بين الحوائط و بعضها و بين الحوائط و الأرضيات زوايا غير حادة"}, {"num": "5", "text": " وجود مصدر للتهوية (تكيف مركزي  ، أو تكيف حائط)"}, {"num": "6", "text": " النوافذ مغلقة دائماً"}, {"num": "7", "text": " يتوافر نظام نداء للممرضات لكل سرير و دورات المياه"}, {"num": "8", "text": " تخصص غرفة لعزل المرضي"}, {"num": "9", "text": " يوجد معمل رعاية متوفر 24 ساعة ( أو يوجد معمل قريب يفي بالغرض )"}, {"num": "10", "text": " يتوافر مخزن للأدوية و المستلزمات الطبية"}, {"num": "11", "text": " توفير مكان للعاملين مخصص لتغيير الملابس ملحق به دورة مياه"}, {"num": "12", "text": " توافر مكان مخزن نظيف و مخزن غير نظيف"}, {"num": "13", "text": " أماكن انتظار الزوار خارج الوحدة"}, {"num": "14", "text": " دورات المياه خارج قاعات المرضى"}]}, {"title": "التجهيزات الخاصة بوحدة العناية المركزة: لابد أن تتوافر التجهيزات الآتية:", "items": [{"num": "15", "text": " مونيتور"}, {"num": "16", "text": " جهاز مونيتور لمراقبة أكثر من مونيتور في وقت واحد central"}, {"num": "17", "text": " جهاز تحكم في إعطاء المحاليل"}, {"num": "18", "text": " جهاز حقن كهربائى بالوريد بالنقط"}, {"num": "19", "text": " جهاز شفاط كهربى"}, {"num": "20", "text": " جهاز استنشاق أو ( فلوميتر على الشبكة  )"}, {"num": "21", "text": " جهاز تنفس صناعي"}, {"num": "22", "text": " أجهزة علاج ارتجاف البطين مزود بجهاز تحفيز ضربات القلب"}, {"num": "23", "text": " منظار حنجري"}, {"num": "24", "text": " سرير عناية مركزة"}, {"num": "25", "text": " مرتبة هوائية"}]}, {"title": "الرعاية الطبية و التمريضية:", "items": [{"num": "26", "text": "يلتزم الأطباء  بتقييم جميع المرضي خلال 24 ساعة من الدخول طبقا لنموذج H&P"}, {"num": "27", "text": "يتم إجراء التقييم التمريضي  لجميع المرضي عند الدخول وخلال الشيفت"}, {"num": "28", "text": "يقوم الطبيب بتوثيق متابعة تقدم حالة المريض مرة في اليوم للحالات الحرجة ."}, {"num": "29", "text": "تلتزم الممرضة بتقييم الألم لجميع المرضي عند الدخول طبقا لنموذج تقييم الألم ."}, {"num": "30", "text": "تلتزم الممرضة بتقييم الحالة التغذوية لكل مريض وتوثيق نوع الغذاء بالملف"}, {"num": "31", "text": "يلتزم الفريق الطبى ( طبيب – ممرضة) بتوثيق خطة الرعاية لكل مريض في الملف الطبي الخاص به"}, {"num": "32", "text": "بروتوكول التعامل مع إجراءات الرعایة الحرجة مثل: الشق الحنجري وإدخال أنبوب مرن إلى القصبة الھوائیة وضعیة الانبطاح خلال التنفس الصناعى وفحص الھذیان( طبيب)"}, {"num": "33", "text": "يوجد نموذج لأوامر تقييد المريض"}, {"num": "34", "text": "يلتزم الطبيب  تجديد أوامر التقييد التي تتم لأسباب طبية وجراحية كل 24 ساعة عند  إستمرارالإحتياج."}, {"num": "35", "text": "يتم حماية حقوق المريض وكرامته وسلامته خلال إستخدام التقييد( طبيب - تمريض)"}, {"num": "36", "text": "تلتزم الممرضة  بمتابعة المريض المقيد وإعادة التقييم خلال الإستخدام."}]}, {"title": "السجلات:", "items": [{"num": "37", "text": " سجل الأوامر الشفهية و التليفونية\n سجل النتائج الحرجة\n سجل تسليم و تسلم الحالات من و إلى الأقسام.\n سجل و نماذج إحالة\n سجل الأعطال\n سجل الصيانة الدورية\n سجل متابعة الإنذارات الحرجة\n سجل بالقسم لتسليم النفايات\n سجل تسليم و تسلم المفروشات النظيفة و غير النظيفة."}]}]}, {"key": "er", "title": "قسم الإستقبال و الطوارئ", "max": 70, "subsections": [{"title": "البنية التحتية بالإستقبال و الطوارئ: لابد أن تتوافر الشروط الآتية :", "items": [{"num": "1", "text": " يسهل الوصول إليه بسيارة الإسعاف أو  مترجلاً."}, {"num": "2", "text": "   وجود لوحات إرشادية داخل و خارج المستشفى توضح إتجاه قسم الطوارئ."}, {"num": "3", "text": "  يوجد منحدرات علي جميع المداخل"}, {"num": "4", "text": " يوجد مكان إنتظار للمرضي و ذويهم  ملحق بها دورات مياه"}, {"num": "5", "text": " يوجد مخزن نظيف و غرفة تجميع المواد و المهمات غير النظيفة"}, {"num": "6", "text": "  يوجد غرفة أدوات النظافة"}, {"num": "7", "text": "  يوجدمكان مخصص لحفظ المستلزمات و الاجهزة الطبية"}, {"num": "8", "text": " الخدمات المساعدة توجد في مكان قريب من الطوارئ و يسهل الوصول إليها ( أشعة , معمل)"}, {"num": "9", "text": "  وجود مكان مخصص لتسجيل المرضى ( غرفة الكاتب) ."}, {"num": "10", "text": "  وجود محطة تمريضية ."}, {"num": "11", "text": "  وجود مكان مخصص لفرز و تصنيف المرضى ."}, {"num": "12", "text": " وجود مكان مخصص للفحص الطبي ( غرف الكشف) ."}, {"num": "13", "text": " وجود مكان لإعطاء العلاج."}, {"num": "14", "text": " وجود مكان للتداخلات الجراحية البسيطة"}, {"num": "15", "text": "    وجود مكان مخصص للملاحظة ( رجال – حريم) ."}, {"num": "16", "text": "  وجود مكان مخصص للجبس."}]}, {"title": "التجهيزات بالطوارئ:", "items": [{"num": "17", "text": "يجب أن تكون التجهيزات التالية متاحة فى مكان قريب ( فى متناول اليد):\n جهاز رسم قلب\n جهاز موجات فوق صوتية\n جهاز أشعة متنقل"}, {"num": "18", "text": "التجهيزات مكان فرز و تصنيف المرضى :\n \tأجهزة ضغط و سماعات طبيب.\n \tترمومتر.\n \tلمبة كشف .\n \tتروللى نقل مريض ."}, {"num": "19", "text": " سياسة فرز و تصنيف المرضى مطبقة"}, {"num": "20", "text": "تتوافر التجهيزات الأتية بغرفة الكشف للبالغين/ الأطفال :\n سرير مريض .                                                \n لمبة كشف  .                                      \n ميزان لوزن شخص .\n منظار أذن , منظار شرجى, منظار فحص عين.\n دولاب لحفظ الآلات والأدوية و المستلزمات ( مؤمن)."}, {"num": "21", "text": "تتوافر الأجهزة و التجهيزات الآتية بغرفة الملاحظة :\n أجهزة ضغط و سماعات \n لمبة كشف\n ميزان \n جهاز قياس نسبة السكر فى الدم\n جهاز إستنشاق\n فانوس أشعة\n وحدة رأس المريض\n منظار اذن, منظار فحص عين\n حامل محاليل"}, {"num": "22", "text": "يجب أن تتوافر التجهيزات التالية بغرفة اعطاء العلاج والتدخلات الجراحية البسيطة:\n سرير كشف\n عربة غيار\n لمبة كشف\n مخارج غازات (أكسجين- شفط)\n تروللى نقل مريض."}, {"num": "23", "text": "يجب أن تتوافرالأجهزة  التالية بغرفة إنعاش الطوارئ:\n تروللى للإنعاش القلبى التنفسى\n أدوات تركيب ممر هوائى\n جهاز صدمات مزود بشاشة \n جهاز إستعادة إنتظام ضربات القلب\n منظار حنجرى         \n جهاز إستنشاق أو ( فلوميتر على الشبكة  )              \n جهاز مونيتور \n عربة الطوارئ ( ترتيبها و مستلزماتها طبقاً لتعليمات الرعاية العاجلة)"}, {"num": "24", "text": "تتوافر هذه التجهيزات بغرفة التجبيس (العظام):\n منشار جبس                                                 \n صينية جبس                                               \n فانوس اشعة\n مخارج للغازات الطبية (أكسجين – شفط)\n ترابيزة وضع الجبس                             \n شاكوش لتنبيه الأعصاب"}, {"num": "25", "text": "تتوافر أماكن تخزين لحفظ الجبس و المستلزمات و الأدوية"}, {"num": "26", "text": "جميع التجهيزات بالطوارئ سليمة"}, {"num": "27", "text": "يوجد دولاب الأزمات و الكوارث."}]}, {"title": "السجلات بالطوارئ :", "items": [{"num": "28", "text": "تتوافرالسجلات الآتية بالطوارئ على الأقل :\n سجل الطوارئ يجب أن يوضح البيانات الآتية على الأقل: وقت الوصول ووقت الخروج وحالة المريض عند الخروج\n سجل كاتب الإستقبال و الطوارئ\n سجل فرز و تصنيف المرضى\n توافر السجلات التمريضية\n سجل النتائج الحرجة\n سجل الأوامر الشفهية و التليفونية\n سجل و نماذج إحالة\n سجل الأعطال\n سجل الصيانة الدورية\n سجل متابعة الإنذارات الحرجة\n سجل CPR\n سجل مجهولى الهوية\n سجل لتسليم النفايات\n سجل بالقسم لتسليم الملاءات والمفروشات الغير نظيفة\n سجل تسليم الحالات للأقسام."}, {"num": "29", "text": "توافر إسطوانات الأكسجين مؤمنة مع توافر أكثر من مصدر أكسجين"}, {"num": "30", "text": "إسطوانات الأكسجين مدون عليها تاريخ الملء و تاريخ بداية التشغيل"}, {"num": "31", "text": "يتم التأكد من إمتلاء إسطوانات الأكسجين مع التوثيق"}, {"num": "32", "text": "سياسة الإستجابة للطوارئ الطبية في المستشفى  البالغين والأطفال CPR))"}, {"num": "33", "text": "التمريض بالطوارئ مدرب على الإنعاش القلبى الرئوى الأساسى"}, {"num": "34", "text": "الأطباء مدربون على الإنعاش القلبى الرئوى المتقدم ( خ يدية الدموية VTE"}, {"num": "25", "text": " يتوافر بروتوكول العمل بالرعاية المركزة"}, {"num": "26", "text": "العاملون بوحدة الغسيل الكلوى  مدربون على هذه البروتوكولات"}]}, {"title": "الملف الطبى:", "items": [{"num": "27", "text": "يوجد ملف طبي لمرضى الغسيل الكلوي يشمل النماذج الأساسية بالملف السابق ذكرها مع إضافة نموذج متابعة جلسة الغسيل."}, {"num": "28", "text": "يتم إستكمال جميع النماذج بالملف الطبي بدقة"}]}, {"title": "السجلات: لابد من توافر السجلات الآتية في وحدة الغسيل الكلوي على الأقل:", "items": [{"num": "29", "text": " سجل حصر المرضى\n سجل الفحوصات الشهرية للمرضى  \n سجل نتائج  الفيروسات للمرضى\n سجل نتائج الفيروسات للعاملين \n سجل تطعيم المرضى\n  سجل تطعيم العاملين\n سجل الوفيات\n سجل نقل الدم \n سجل عينات و نتائج فحص المياه\n سجل تسجيل كفاءة الجلسة\n سجل التقصى\n سجل حصر الأجهزة\n سجل الأعطال\n سجل التدخلات و الإجراءات الخارجية\n سجل توزيع المهام\n سجل الأوامر الشفهية و التليفونية\n سجل النتائج الحرجة\n سجل و نماذج إحالة\n سجل الصيانة الدورية\n سجل متابعة الإنذارات الحرجة\n سجل بالقسم لتسليم النفايات\n سجل تسليم و تسلم المفروشات النظيفة و غير النظيفة."}]}, {"title": "الإقرارات:", "items": [{"num": "30", "text": "يتم أخذ الموافقة على الإقرارات الآتية: \n إجراء الجلسة\n نقل الدم مع كل مرة نقل دم\n أى إجراء تداخلى"}]}, {"title": "فحوصات المرضى:", "items": [{"num": "31", "text": "تلتزم الوحدة بإجراء الفحوصات التالية لجميع المرضى :\n  لا يتم عمل غسيل لأي مريض جديد قبل إجراء التحليل القبلي له بطريقة  ELISA.\n \tيتم عمل الفحوص الفيروسية للمرضى بصفة دورية كل 3 شهور (HCV- HBV- HIV )\n \tفي حالة الطوارئ القصوى يتم عمل Rapid test مع سحب  عينة ELISA."}, {"num": "32", "text": "يتم إرسال عينة للمعامل المركزية في حالة ايجابية لفيروس نقص المناعة المكتسبة HIV."}, {"num": "33", "text": "تحول الحالات الايجابية لفيروس HIV لإجراء الغسيل الكلوي في مستشفى الحميات"}]}]}, {"key": "burns", "title": "قسم الحروق", "max": 26, "subsections": [{"title": "البنية التحتية:", "items": [{"num": "1", "text": "يجب أن يكون القسم بمكان قريب من العمليات / الطوارئ."},
